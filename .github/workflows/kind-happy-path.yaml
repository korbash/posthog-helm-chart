name: kind-happy-path

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/kind-happy-path.yaml
      - charts/posthog/**
      - images/clickhouse/**
      - kind-config*.yaml
      - manifests/**
      - scripts/kind-bootstrap.sh
      - vendor/posthog/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/kind-happy-path.yaml
      - charts/posthog/**
      - images/clickhouse/**
      - kind-config*.yaml
      - manifests/**
      - scripts/kind-bootstrap.sh
      - vendor/posthog/**

permissions:
  contents: read

env:
  KIND_CLUSTER_NAME: posthog-ci
  LOCAL_REGISTRY_NAME: kind-registry
  LOCAL_REGISTRY_PORT: "5001"
  CLICKHOUSE_TAG: "26.4"

jobs:
  happy-path:
    name: manifests happy path in kind
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free runner disk
        shell: bash
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/lib/jvm \
            /usr/local/.ghcup \
            /usr/local/share/powershell \
            /usr/share/swift
          docker image prune --all --force
          docker builder prune --all --force
          df -h

      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install kind and Flux
        shell: bash
        run: |
          set -euo pipefail
          go install sigs.k8s.io/kind@v0.29.0
          sudo install -m 0755 "$(go env GOPATH)/bin/kind" /usr/local/bin/kind
          curl -fsSL https://fluxcd.io/install.sh | sudo bash
          kind version
          flux --version
          kubectl version --client=true
          helm version

      - name: Start local OCI registry
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --restart=always \
            -p "127.0.0.1:${LOCAL_REGISTRY_PORT}:5000" \
            --name "${LOCAL_REGISTRY_NAME}" \
            registry:2

      - name: Create kind cluster
        shell: bash
        run: |
          set -euo pipefail
          cat >/tmp/kind-ci.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
            - |-
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:${LOCAL_REGISTRY_PORT}"]
                endpoint = ["http://${LOCAL_REGISTRY_NAME}:5000"]
          nodes:
            - role: control-plane
          EOF

          kind create cluster --name "${KIND_CLUSTER_NAME}" --config /tmp/kind-ci.yaml
          docker network connect kind "${LOCAL_REGISTRY_NAME}" || true
          kubectl get nodes -o wide

      - name: Build and publish local test artifacts
        shell: bash
        run: |
          set -euo pipefail
          CH_IMAGE="localhost:${LOCAL_REGISTRY_PORT}/posthog-clickhouse:${CLICKHOUSE_TAG}"
          docker build -f images/clickhouse/Dockerfile -t "${CH_IMAGE}" .
          docker push "${CH_IMAGE}"

          mkdir -p /tmp/chart
          helm package charts/posthog --destination /tmp/chart
          helm push --plain-http /tmp/chart/posthog-*.tgz "oci://localhost:${LOCAL_REGISTRY_PORT}/charts"

      - name: Install Flux
        shell: bash
        run: |
          set -euo pipefail
          flux install
          kubectl -n flux-system rollout status deploy/source-controller --timeout=5m
          kubectl -n flux-system rollout status deploy/helm-controller --timeout=5m

      - name: Prepare CI manifest overlay
        shell: bash
        run: |
          set -euo pipefail
          cp -a manifests /tmp/ci-manifests

          sed -i \
            's#url: oci://ghcr.io/blitss/charts/posthog#url: oci://ci-registry.posthog.svc.cluster.local:5000/charts/posthog\n  insecure: true#' \
            /tmp/ci-manifests/posthog/ocirepository.yaml

          sed -i \
            "s#image: ghcr.io/blitss/posthog-clickhouse:${CLICKHOUSE_TAG}#image: localhost:${LOCAL_REGISTRY_PORT}/posthog-clickhouse:${CLICKHOUSE_TAG}#" \
            /tmp/ci-manifests/posthog/clickhouse.yaml

          kubectl create namespace posthog --dry-run=client -o yaml | kubectl apply -f -
          REGISTRY_IP="$(docker inspect -f '{{.NetworkSettings.Networks.kind.IPAddress}}' "${LOCAL_REGISTRY_NAME}")"
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: ci-registry
            namespace: posthog
          spec:
            ports:
              - name: registry
                port: 5000
                targetPort: 5000
          ---
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: ci-registry
            namespace: posthog
          subsets:
            - addresses:
                - ip: ${REGISTRY_IP}
              ports:
                - name: registry
                  port: 5000
          EOF

          kubectl apply -f /tmp/ci-manifests/infra/namespaces.yaml
          kubectl create namespace elastic-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace secretgen-controller --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply --dry-run=server -k /tmp/ci-manifests/infra
          kubectl apply --dry-run=server -k /tmp/ci-manifests/posthog-ci || true

      - name: Apply infra manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -k /tmp/ci-manifests/infra

          kubectl wait --for=condition=Ready helmrelease/cert-manager -n cert-manager --timeout=15m
          kubectl wait --for=condition=Ready helmrelease/cnpg -n cnpg-system --timeout=15m
          kubectl wait --for=condition=Ready helmrelease/clickhouse-operator -n posthog --timeout=15m
          kubectl wait --for=condition=Ready helmrelease/redpanda-operator -n posthog --timeout=15m

          kubectl -n secretgen-controller rollout status deploy/secretgen-controller --timeout=10m
          kubectl -n elastic-system rollout status statefulset/elastic-operator --timeout=10m
          kubectl -n posthog rollout status deploy/clickhouse-operator-altinity-clickhouse-operator --timeout=10m
          kubectl -n posthog rollout status deploy/redpanda-operator --timeout=10m

      - name: Apply PostHog manifests
        shell: bash
        run: |
          set -euo pipefail

          dump_posthog() {
            kubectl get helmrelease,ocirepository -n posthog || true
            kubectl get jobs -n posthog -o wide || true
            kubectl get pods -n posthog -o wide || true
            kubectl get events -n posthog --sort-by=.lastTimestamp | tail -120 || true

            echo "--- helmrelease/posthog conditions ---"
            kubectl get helmrelease posthog -n posthog -o jsonpath='{range .status.conditions[*]}{.type}={.status} {.reason} {.message}{"\n"}{end}' || true

            echo "--- not-ready pods ---"
            kubectl get pods -n posthog --no-headers 2>/dev/null | awk '
              $3 == "Completed" { next }
              $3 != "Running" { print; next }
              {
                split($2, ready, "/")
                if (ready[1] != ready[2]) print
              }
            ' || true

            echo "--- hook logs ---"
            for job in posthog-db-check posthog-migrate posthog-async-migrations-check posthog-kafka-init posthog-create-buckets; do
              if kubectl get job -n posthog "$job" >/dev/null 2>&1; then
                echo "### $job"
                kubectl logs -n posthog "job/$job" --tail=160 || true
              fi
            done

            echo "--- redpanda logs ---"
            kubectl logs -n posthog posthog-redpanda-0 --all-containers --tail=200 --prefix || true
            kubectl logs -n posthog posthog-redpanda-0 -c redpanda --previous --tail=200 --prefix || true

            echo "--- web logs ---"
            kubectl logs -n posthog -l app.kubernetes.io/component=web --all-containers --tail=120 --prefix || true

            echo "--- worker logs ---"
            kubectl logs -n posthog -l app.kubernetes.io/component=worker --all-containers --tail=120 --prefix || true
          }

          watch_posthog() {
            while true; do
              echo "::group::posthog cluster state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              dump_posthog
              echo "::endgroup::"
              sleep 30
            done
          }

          fail_fast_on_cluster_errors() {
            failed_jobs="$(kubectl get jobs -n posthog -o jsonpath='{range .items[?(@.status.failed>0)]}{.metadata.name}{" "}{end}' 2>/dev/null || true)"
            if [[ -n "${failed_jobs}" ]]; then
              echo "failed jobs: ${failed_jobs}" >&2
              return 1
            fi

            fatal_pods="$(
              kubectl get pods -n posthog --no-headers 2>/dev/null | awk '
                $3 ~ /CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError|RunContainerError|PostStartHookError|OOMKilled/ { print }
              '
            )"
            if [[ -n "${fatal_pods}" ]]; then
              echo "fatal pod states:" >&2
              echo "${fatal_pods}" >&2
              return 1
            fi

            unschedulable="$(
              kubectl get events -n posthog --field-selector reason=FailedScheduling --sort-by=.lastTimestamp 2>/dev/null | tail -20 | grep -E 'Insufficient|didn.t match|node\\(s\\) had' || true
            )"
            if [[ -n "${unschedulable}" ]]; then
              echo "unschedulable pods:" >&2
              echo "${unschedulable}" >&2
              return 1
            fi

          }

          watch_posthog &
          WATCH_PID="$!"
          trap 'kill "${WATCH_PID}" 2>/dev/null || true' EXIT

          kubectl apply -k /tmp/ci-manifests/posthog-ci
          kubectl wait --for=condition=Ready ocirepository/posthog-chart -n posthog --timeout=10m

          deadline=$((SECONDS + 4500))
          while true; do
            if ! fail_fast_on_cluster_errors; then
              dump_posthog
              exit 1
            fi

            ready="$(kubectl get helmrelease posthog -n posthog -o jsonpath='{range .status.conditions[?(@.type=="Ready")]}{.status}{end}' 2>/dev/null || true)"
            if [[ "${ready}" == "True" ]]; then
              break
            fi

            if (( SECONDS > deadline )); then
              echo "timed out waiting for helmrelease/posthog to become Ready" >&2
              dump_posthog
              exit 1
            fi

            sleep 10
          done

          deadline=$((SECONDS + 600))
          while true; do
            if ! fail_fast_on_cluster_errors; then
              dump_posthog
              exit 1
            fi

            not_ready="$(
              kubectl get pods -n posthog --no-headers | awk '
                $3 == "Completed" { next }
                $3 != "Running" { print; next }
                {
                  split($2, ready, "/")
                  if (ready[1] != ready[2]) print
                }
              '
            )"
            if [[ -z "${not_ready}" ]]; then
              kubectl get pods -n posthog -o wide
              break
            fi
            if (( SECONDS > deadline )); then
              echo "timed out waiting for PostHog pods:" >&2
              echo "${not_ready}" >&2
              exit 1
            fi
            echo "${not_ready}"
            sleep 15
          done

      - name: Verify happy path
        shell: bash
        run: |
          set -euo pipefail

          WEB="$(kubectl get pod -n posthog -l app.kubernetes.io/component=web -o jsonpath='{.items[?(@.status.containerStatuses[0].ready==true)].metadata.name}')"
          if [[ -z "${WEB}" ]]; then
            echo "no ready web pod found" >&2
            exit 1
          fi

          deadline=$((SECONDS + 600))
          while true; do
            PREFLIGHT="$(kubectl exec -n posthog "${WEB}" -- python -c 'import urllib.request; print(urllib.request.urlopen("http://127.0.0.1:8000/_preflight/", timeout=30).read().decode(), end="")')"
            echo "${PREFLIGHT}"
            if PREFLIGHT="${PREFLIGHT}" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["PREFLIGHT"])
          required_true = ["django", "redis", "plugins", "celery", "clickhouse", "db", "object_storage"]
          bad = [key for key in required_true if payload.get(key) is not True]
          if bad:
              raise SystemExit(f"preflight fields not true: {bad}; payload={payload}")

          # Current PostHog self-host preflight reports kafka as in_cloud or TEST.
          if payload.get("kafka") is not False:
              raise SystemExit(f"unexpected kafka preflight value: {payload.get('kafka')!r}")
          PY
            then
              break
            fi
            if (( SECONDS > deadline )); then
              echo "timed out waiting for healthy preflight" >&2
              exit 1
            fi
            sleep 10
          done

          kubectl exec -n posthog posthog-redpanda-0 -c redpanda -- rpk cluster info
          kubectl exec -n posthog posthog-redpanda-0 -c redpanda -- rpk topic list | grep -E '^clickhouse_events_json[[:space:]]'
          kubectl wait --for=condition=Ready redpanda/posthog-redpanda -n posthog --timeout=10m

          CH_PW="$(kubectl get secret posthog-clickhouse-password -n posthog -o jsonpath='{.data.password}' | base64 -d)"
          kubectl exec -n posthog chi-posthog-posthog-0-0-0 -- clickhouse client --password "${CH_PW}" --database system --query "SELECT version()"
          kubectl exec -n posthog chi-posthog-posthog-0-0-0 -- clickhouse client --password "${CH_PW}" --database system --query "SELECT throwIf(count() = 0, 'aggregate_funnel missing') FROM system.functions WHERE name = 'aggregate_funnel'"
          kubectl exec -n posthog chi-posthog-posthog-0-0-0 -- clickhouse client --password "${CH_PW}" --database system --query "SELECT throwIf(count() < 4, 'warpstream named collections missing') FROM system.named_collections WHERE name LIKE 'warpstream_%'"

      - name: Dump diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl get nodes -o wide
          kubectl get helmreleases -A
          kubectl get pods -A -o wide
          kubectl get events -A --sort-by=.lastTimestamp | tail -200
          kubectl describe pods -n posthog
          kubectl logs -n flux-system deploy/source-controller --tail=300
          kubectl logs -n flux-system deploy/helm-controller --tail=300
          kubectl logs -n posthog -l app.kubernetes.io/component=web --all-containers --tail=300 --prefix
          kubectl logs -n posthog -l app.kubernetes.io/component=worker --all-containers --tail=300 --prefix
          kubectl logs -n posthog posthog-redpanda-0 --all-containers --tail=300 --prefix
          kubectl logs -n posthog chi-posthog-posthog-0-0-0 --all-containers --tail=300 --prefix
          docker ps -a
          docker logs "${KIND_CLUSTER_NAME}-control-plane" --tail=300
