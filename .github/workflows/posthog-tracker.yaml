name: posthog-tracker

on:
  schedule:
    # Daily at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      since_sha:
        description: "Override starting SHA (default: read from .github/posthog-tracker.last-sha; falls back to 24h window)"
        required: false
        default: ""
      since_hours:
        description: "Override window in hours (only used when since_sha is empty AND state file is missing)"
        required: false
        default: "24"
      dry_run:
        description: "Dry run: print what would be opened, don't create issues"
        type: boolean
        required: false
        default: false

concurrency:
  group: posthog-tracker
  cancel-in-progress: true

permissions:
  # contents: write so we can commit the last-scanned-SHA state file back to the repo.
  contents: write
  issues: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and pre-filter PostHog upstream commits
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE_HOURS: ${{ github.event.inputs.since_hours || '24' }}
          SINCE_SHA_INPUT: ${{ github.event.inputs.since_sha || '' }}
        run: |
          set -euo pipefail

          # Determine the cursor: explicit input > state file > 24h fallback.
          STATE_FILE=".github/posthog-tracker.last-sha"
          SINCE_SHA=""
          if [ -n "$SINCE_SHA_INPUT" ]; then
            SINCE_SHA="$SINCE_SHA_INPUT"
            echo "Using explicit since_sha: $SINCE_SHA"
          elif [ -f "$STATE_FILE" ]; then
            SINCE_SHA=$(cat "$STATE_FILE" | tr -d '[:space:]')
            echo "Using state file SHA: $SINCE_SHA"
          fi

          # Get current upstream HEAD — this becomes the new cursor on success.
          NEW_HEAD=$(gh api repos/PostHog/posthog/commits/master --jq '.sha')
          echo "Upstream master HEAD: $NEW_HEAD"

          : > /tmp/posthog-commits-raw.json
          echo "[" > /tmp/posthog-commits-raw.json
          first=true

          if [ -n "$SINCE_SHA" ]; then
            # SHA-based: use compare API to get commits SINCE_SHA..NEW_HEAD in one call.
            # Compare returns up to 250 commits in .commits[].
            if [ "$SINCE_SHA" = "$NEW_HEAD" ]; then
              echo "No new commits since last run."
            else
              compare=$(gh api "repos/PostHog/posthog/compare/${SINCE_SHA}...${NEW_HEAD}" 2>/dev/null || echo '{"commits":[]}')
              entries=$(echo "$compare" | jq -c '[.commits[] | {sha: .sha, message: .commit.message, author: .commit.author.name, date: .commit.author.date, url: .html_url}] | .[]')
              while IFS= read -r entry; do
                [ -z "$entry" ] && continue
                if [ "$first" = true ]; then first=false; else echo "," >> /tmp/posthog-commits-raw.json; fi
                echo "$entry" >> /tmp/posthog-commits-raw.json
              done <<< "$entries"
            fi
          else
            # Time-window fallback (first run, no state file).
            SINCE=$(date -u -d "${SINCE_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
            echo "No prior cursor — falling back to ${SINCE_HOURS}h window since $SINCE"
            for page in 1 2 3 4 5; do
              page_data=$(gh api \
                "repos/PostHog/posthog/commits?sha=master&since=${SINCE}&per_page=100&page=${page}" \
                --jq '[.[] | {sha: .sha, message: .commit.message, author: .commit.author.name, date: .commit.author.date, url: .html_url}]')
              page_count=$(echo "$page_data" | jq length)
              [ "$page_count" -eq 0 ] && break
              entries=$(echo "$page_data" | jq -c '.[]')
              while IFS= read -r entry; do
                if [ "$first" = true ]; then first=false; else echo "," >> /tmp/posthog-commits-raw.json; fi
                echo "$entry" >> /tmp/posthog-commits-raw.json
              done <<< "$entries"
              [ "$page_count" -lt 100 ] && break
            done
          fi

          echo "]" >> /tmp/posthog-commits-raw.json
          RAW_COUNT=$(jq length /tmp/posthog-commits-raw.json)
          echo "Total commits to scan: $RAW_COUNT"
          echo "new_head=$NEW_HEAD" >> "$GITHUB_OUTPUT"

          if [ "$RAW_COUNT" -eq 0 ]; then
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Path-based pre-filter. Watched paths in upstream PostHog/posthog:
          #   - docker-compose*.yml
          #   - production.Dockerfile, *.Dockerfile, Dockerfile
          #   - docker/** (clickhouse XMLs, etc.)
          #   - bin/** (entrypoints)
          #   - charts/** (their reference helm chart)
          #   - .github/workflows/build-* (image build pipeline)
          # We filter server-side here so Claude only sees commits that touch
          # these paths — message-first triage was missing infra changes with
          # generic commit messages.
          WATCHED_REGEX='^(docker-compose|production\.Dockerfile|Dockerfile|.*\.Dockerfile$|docker/|bin/|charts/|\.github/workflows/build-)'

          echo "Pre-filtering commits by changed paths…"
          : > /tmp/posthog-commits-filtered.ndjson
          fetched=0
          while IFS= read -r commit; do
            sha=$(echo "$commit" | jq -r .sha)
            files_json=$(gh api "repos/PostHog/posthog/commits/${sha}" \
              --jq '[.files[].filename]' 2>/dev/null || echo '[]')
            watched=$(echo "$files_json" | jq --arg re "$WATCHED_REGEX" \
              '[.[] | select(test($re))]')
            watched_count=$(echo "$watched" | jq 'length')
            if [ "$watched_count" -gt 0 ]; then
              echo "$commit" | jq --argjson files "$watched" \
                '. + {watchedFiles: $files}' >> /tmp/posthog-commits-filtered.ndjson
            fi
            fetched=$((fetched + 1))
            if [ $((fetched % 25)) -eq 0 ]; then
              echo "  …$fetched/$RAW_COUNT processed"
            fi
          done < <(jq -c '.[]' /tmp/posthog-commits-raw.json)

          jq -s . /tmp/posthog-commits-filtered.ndjson > /tmp/posthog-commits.json
          KEPT=$(jq length /tmp/posthog-commits.json)
          echo "Surviving commits after path filter: $KEPT/$RAW_COUNT"

          if [ "$KEPT" -eq 0 ]; then
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tracker prompt
        id: build_prompt
        if: steps.commits.outputs.has_commits == 'true'
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          COMMITS=$(cat /tmp/posthog-commits.json)

          if [ "$DRY_RUN_INPUT" = "true" ]; then
            MODE_INSTRUCTION="You are running in DRY RUN mode. DO NOT call \`gh issue create\`. Print a structured report to stdout only."
            ACTION_INSTRUCTION="For every relevant commit, print:

          ---
          WOULD OPEN ISSUE: <title>
          Priority: Breaking | Important | Minor
          Commits: <sha(s)>
          Why it matters here: <2-3 sentences>
          Files in this repo likely affected: <paths or 'unknown'>
          Suggested action: <what a maintainer should do>
          ---

          End with: 'X relevant changes found out of Y total commits. Z issues would be opened.'"
          else
            MODE_INSTRUCTION="Create GitHub issues for relevant changes via \`gh issue create\` in THIS repository."
            ACTION_INSTRUCTION="Rules:
          - Before creating, list open issues with label \`posthog-tracker\` and skip duplicates (same SHA(s) or same upstream PR).
          - Title: \`[posthog-tracker] <short summary>\`
          - Body must include: priority (Breaking/Important/Minor), upstream commit links, why it matters here, files in this repo likely affected, suggested action.
          - Labels: always add \`posthog-tracker\`. Add \`priority/breaking\`, \`priority/important\`, or \`priority/minor\` matching the priority.
          - If nothing is relevant, do nothing."
          fi

          {
            echo 'prompt<<PROMPT_DELIM'
            cat <<PROMPT_EOF
          You are auditing upstream PostHog commits to decide whether they require changes to THIS repository.

          ABOUT THIS REPO (\`blitss/posthog-helm-chart\`):
          A self-hosted Helm chart that wraps upstream PostHog (\`PostHog/posthog\`) for Kubernetes. It does NOT vendor the application code — it builds custom container images from upstream and ships its own Helm chart and Flux manifests around them.

          RELEVANT PIECES OF THIS REPO:
          - \`charts/posthog/\` — the Helm chart (Deployments, Services, ConfigMaps, Secrets, ClickHouse + ClickHouse-Keeper config XML embedded in templates).
          - \`charts/posthog/values.yaml\` — defaults for every component (web, worker, workerBeat, workerExports, temporalDjangoWorker, plugins, capture, replayCapture, captureAi, captureLogs, featureFlags, propertyDefsRs, livestream, cymbal, cyclotronJanitor, migrate, asyncMigrationsCheck) and Kafka topic provisioning.
          - \`charts/posthog/templates/external/clickhouse.yaml\` — ClickHouse config.xml + users.xml profiles, system-table TTLs, profile settings copied from upstream \`docker/clickhouse/config.xml\` and \`docker/clickhouse/users.xml\`.
          - \`images/posthog/Dockerfile.{web,worker,worker-exports,migrate,bootstrap-clickhouse}\` — custom Dockerfiles built from upstream \`production.Dockerfile\` style images.
          - \`vendor/posthog/docker/clickhouse/user_defined_function.xml\` and \`vendor/posthog/user_scripts/\` — files copied verbatim from upstream (auto-synced by \`sync-posthog-user-scripts\` workflow).
          - \`scripts/update-topics.sh\` — pulls Kafka topic list from upstream (auto-synced by \`sync-posthog-topics\` workflow).
          - \`manifests/posthog/release.yaml\` — Flux HelmRelease values used in production.

          ALREADY AUTO-SYNCED — DO NOT FILE ISSUES FOR THESE:
          - Kafka topic config (\`posthog/clickhouse/kafka_engine.py\`, \`posthog/kafka_client/topics.py\`) → handled by \`sync-posthog-topics.yaml\`.
          - ClickHouse user-defined functions and user scripts under \`posthog/user_scripts/\` and \`posthog/clickhouse/user_defined_function.xml\` → handled by \`sync-posthog-user-scripts.yaml\`.

          FILES THAT MATTER (the *only* paths worth a closer look):
          - \`docker-compose*.yml\` / \`docker-compose*.yaml\` — service topology. New service blocks here are the strongest signal a new Deployment may be needed.
          - \`*Dockerfile*\` and \`production.Dockerfile\` — image build contract (new build stages, new entrypoints, removed binaries).
          - \`docker/**\` — config files copied into images (especially \`docker/clickhouse/config.xml\`, \`docker/clickhouse/users.xml\`).
          - \`bin/start-*\`, \`bin/migrate-*\`, \`bin/*\` — entrypoint scripts the chart invokes.
          - \`charts/**\` (upstream's own helm chart, if touched) — structural changes (new templates, removed components).
          - \`.github/workflows/build-*\` and \`*.dockerignore\` — image build pipeline contract.

          The FILES THAT MATTER list is your reference when reading a diff — if the only changed files in a fetched diff are outside that list, drop it.

          WHAT TO FLAG (priority Breaking or Important) — STRUCTURAL changes inside the watched paths:
          1. New services/processes added in \`docker-compose*\` or \`charts/**\` that don't yet have a Deployment in this repo. THIS IS THE PRIMARY FOCUS.
          2. Removed or renamed services/components that this chart still references.
          3. Changes to \`bin/\` entrypoints that change CLI args, flags, or env-var contracts.
          4. ANY change under \`docker/clickhouse/**\` — \`config.xml\`, \`users.xml\`, AND \`config.d/*.xml\` (default.xml, coordinator.xml, data_node.xml, etc.). New \`named_collections\`, \`remote_servers\` entries, \`macros\`, or any new \`config.d\` file must be ported into our embedded XML in \`charts/posthog/templates/external/clickhouse.yaml\`. Recent example we missed: \`warpstream_calculated_events\` / \`warpstream_replay\` / \`warpstream_shared\` named collections were added in upstream's \`config.d/default.xml\`.
          5. Changes to Dockerfile *structure* — new build args, new stages, new \`COPY\`/\`RUN\` that change runtime layout, removed binaries.

          WHAT TO IGNORE (even if the file is in the watched list):
          - **Image version bumps, base-image bumps, dependency version bumps of any kind.** Renovate handles these locally.
          - Helm chart version bumps in upstream's \`Chart.yaml\` or \`values.yaml\` image-tag fields.
          - Pure tag/digest/version-string changes inside docker-compose or Dockerfiles.
          - Anything outside the FILES THAT MATTER list — Python source, frontend, tests, docs, fixtures, telemetry, settings modules, migrations, telemetry, CI workflows that don't build images.

          DECISION HEURISTIC: First filter is path. If no watched path is touched → skip. Second filter is shape. If the change is only a version string/tag/digest → skip. Only flag when (a) a watched path is touched AND (b) the *shape* of a service, build, or config changes.

          ${MODE_INSTRUCTION}

          COMMITS TO TRIAGE (already fetched, do not re-list):
          ${COMMITS}

          IMPORTANT: The commit list below has ALREADY been path-filtered. Every
          commit here touches at least one watched path (listed in its
          \`watchedFiles\` field). You do NOT need to re-filter by path — that's
          done. Your job is the second-stage filter: is the change structural,
          or is it just a version/tag/digest bump?

          STEPS:
          1. For each commit, fetch the diff for its watched files only:
             \`gh api repos/PostHog/posthog/commits/<sha>\` and inspect the
             relevant patches.
          2. If the change inside watched files is purely a version bump (image
             tag, dependency version, base image SHA), drop it — Renovate
             handles those.
          3. If the change is structural (new service block in docker-compose,
             new build stage, new entrypoint flag, new config key, removed
             component), classify priority and act:
             - Breaking: chart is or will be broken without action.
             - Important: config drift, missing functionality.
             - Minor: cosmetic / optional.
          4. ${ACTION_INSTRUCTION}

          IMPORTANT:
          - Do NOT explore this repo's code beyond what's described above. The summary in this prompt is sufficient context.
          - Do NOT spawn subagents.
          - Be conservative: when unsure whether a commit affects this chart, skip it. False positives are worse than false negatives.
          PROMPT_EOF
            echo 'PROMPT_DELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Run posthog-tracker (Claude Code)
        if: steps.commits.outputs.has_commits == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.build_prompt.outputs.prompt }}
          show_full_output: true
          claude_args: |
            --model claude-opus-4-7
            --verbose
            --allowed-tools "Bash(gh api:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(jq:*)"

      - name: Skip (no commits)
        if: steps.commits.outputs.has_commits == 'false'
        env:
          SINCE_HOURS: ${{ github.event.inputs.since_hours || '24' }}
        run: echo "No PostHog upstream commits in the window. Nothing to do."

      # Commit the new cursor only on a real scheduled/manual run, not dry-runs.
      # If Claude opened issues, we still advance the cursor so the same commits
      # don't get re-flagged tomorrow. If Claude failed mid-run the workflow
      # itself fails before this step, leaving the cursor untouched (we'll
      # re-scan the same range next time).
      - name: Persist last-scanned SHA
        if: success() && github.event.inputs.dry_run != 'true' && steps.commits.outputs.new_head != ''
        env:
          NEW_HEAD: ${{ steps.commits.outputs.new_head }}
        run: |
          set -euo pipefail
          STATE_FILE=".github/posthog-tracker.last-sha"
          mkdir -p .github
          echo "$NEW_HEAD" > "$STATE_FILE"
          if git diff --quiet -- "$STATE_FILE"; then
            echo "Cursor unchanged."
            exit 0
          fi
          git config user.name "posthog-tracker[bot]"
          git config user.email "posthog-tracker@users.noreply.github.com"
          git add "$STATE_FILE"
          git commit -m "chore(tracker): advance cursor to ${NEW_HEAD:0:7}"
          git push origin HEAD:main
