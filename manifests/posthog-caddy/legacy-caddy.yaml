# Services and routing for the Docker Compose Caddy backend (legacy spposthog.gg).
#
# With Traefik running hostNetwork, 127.0.0.1 inside the Traefik pod IS the
# host loopback, so the Endpoints below reach Docker Caddy on its internal ports.
#
# HTTP flow:  spposthog.gg:80  -> Traefik (web) -> IngressRoute -> legacy-caddy-http -> Caddy :18080
# HTTPS flow: spposthog.gg:443 -> Traefik (websecure) terminates TLS -> legacy-caddy-http -> Caddy :18080
#
# Note: Switched from TCP SNI passthrough (2026-05-13) because Caddy stopped
# listening on :18443 after compose proxy container recreate (Let's Encrypt ACME
# challenges fail behind Traefik). Traefik now terminates TLS with its own cert
# resolver and forwards plain HTTP to Caddy. legacy-caddy-https Service+Endpoints
# kept for potential future revert to TLS passthrough once Caddy reclaims :443.
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-caddy-http
  namespace: traefik
spec:
  ports:
    - port: 80
      targetPort: 18080
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: legacy-caddy-http
  namespace: traefik
subsets:
  - addresses:
      - ip: 172.18.0.1
    ports:
      - port: 18080
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-caddy-https
  namespace: traefik
spec:
  ports:
    - port: 443
      targetPort: 18443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: legacy-caddy-https
  namespace: traefik
subsets:
  - addresses:
      - ip: 172.18.0.1
    ports:
      - port: 18443
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spposthog-http
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`spposthog.gg`)
      services:
        - name: legacy-caddy-http
          port: 80
---
# HTTPS: Traefik terminates TLS and forwards plain HTTP to Caddy on :18080.
# Traefik uses its default cert resolver (fallback cert) — works with Cloudflare
# in Full SSL mode (not Full Strict).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spposthog-https
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`spposthog.gg`)
      services:
        - name: legacy-caddy-http
          port: 80
  tls: {}
