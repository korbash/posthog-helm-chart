apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: traefik
      version: "40.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    deployment:
      replicas: 1
      # Required for DNS resolution when using hostNetwork
      dnsPolicy: ClusterFirstWithHostNet
    updateStrategy:
      type: Recreate
    # Bind directly on host network so Traefik owns ports 80/443 without NodePort
    hostNetwork: true
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
    service:
      spec:
        type: ClusterIP
    ports:
      web:
        expose:
          default: true
        exposedPort: 80
        port: 80
      websecure:
        expose:
          default: true
        exposedPort: 443
        port: 443
      postgres:
        expose:
          default: true
        exposedPort: 5432
        port: 5432
      clickhouse:
        expose:
          default: true
        exposedPort: 9440
        port: 9440
      # Avoid conflicts with node-exporter (9100) and other host services (8080)
      metrics:
        port: 19100
        expose:
          default: false
      traefik:
        port: 19080
        expose:
          default: false
    providers:
      kubernetesCRD:
        enabled: true
        allowEmptyServices: true
      kubernetesIngress:
        enabled: true
        allowEmptyServices: true
        publishedService:
          enabled: true
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      capabilities:
        add:
          - NET_BIND_SERVICE
        drop:
          - ALL
      readOnlyRootFilesystem: true
    podSecurityContext:
      runAsNonRoot: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
