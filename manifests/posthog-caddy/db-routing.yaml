apiVersion: v1
kind: Service
metadata:
  name: clickhouse-posthog-secure
  namespace: posthog
spec:
  type: ClusterIP
  ports:
    - name: native-tls
      port: 9440
      targetPort: 9440
      protocol: TCP
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    clickhouse.altinity.com/app: chop
    clickhouse.altinity.com/chi: posthog
    clickhouse.altinity.com/namespace: posthog
    clickhouse.altinity.com/ready: "yes"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: posthog-postgres
  namespace: posthog
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`postgres.37.27.124.54.nip.io`)
      services:
        - name: posthog-pg-rw
          port: 5432
  tls:
    passthrough: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: posthog-clickhouse-https
  namespace: posthog
spec:
  entryPoints:
    - clickhouse-https
  routes:
    - match: HostSNI(`clickhouse.37.27.124.54.nip.io`)
      services:
        - name: clickhouse-posthog-secure
          port: 8443
  tls:
    passthrough: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: posthog-clickhouse
  namespace: posthog
spec:
  entryPoints:
    - clickhouse
  routes:
    - match: HostSNI(`clickhouse.37.27.124.54.nip.io`)
      services:
        - name: clickhouse-posthog-secure
          port: 9440
  tls:
    passthrough: true
