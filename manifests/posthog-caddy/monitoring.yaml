apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traefik
  namespace: traefik
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: traefik-traefik
      app.kubernetes.io/name: traefik
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redpanda
  namespace: posthog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: posthog-redpanda
      app.kubernetes.io/name: redpanda
  endpoints:
    - port: admin
      path: /public_metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-posthog-metrics
  namespace: posthog
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: posthog
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9363
      targetPort: 9363
      protocol: TCP
  selector:
    clickhouse.altinity.com/app: chop
    clickhouse.altinity.com/chi: posthog
    clickhouse.altinity.com/namespace: posthog
    clickhouse.altinity.com/ready: "yes"
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse
  namespace: posthog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: posthog
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
