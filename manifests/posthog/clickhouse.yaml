apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: posthog
  namespace: posthog
spec:
  defaults:
    templates:
      dataVolumeClaimTemplate: data
      podTemplate: clickhouse
  configuration:
    users:
      default/password:
        valueFrom:
          secretKeyRef:
            name: posthog-clickhouse-password
            key: password
      default/default_database: default
      default/networks/ip: "::/0"
      default/profile: default
      default/quota: default
      default/access_management: "1"
      default/named_collection_control: "1"
      default/show_named_collections: "1"
      default/show_named_collections_secrets: "1"
      api/password:
        valueFrom:
          secretKeyRef:
            name: posthog-clickhouse-password
            key: password
      api/default_database: default
      api/networks/ip: "::/0"
      api/profile: api
      api/quota: default
      app/password:
        valueFrom:
          secretKeyRef:
            name: posthog-clickhouse-password
            key: password
      app/default_database: default
      app/networks/ip: "::/0"
      app/profile: app
      app/quota: default
    profiles:
      default/max_memory_usage: "10000000000"
      default/load_balancing: random
      default/allow_nondeterministic_mutations: "1"
      default/enable_analyzer: "0"
      default/compatibility: "25.10"
      default/distributed_product_mode: global
      default/enable_parallel_replicas: "0"
      default/max_parallel_replicas: "1"
      default/allow_experimental_window_functions: "1"
      default/allow_suspicious_low_cardinality_types: "1"
      default/insert_distributed_sync: "1"
      default/throw_on_max_partitions_per_insert_block: "false"
      default/number_of_mutations_to_throw: "1"
      readonly/readonly: "1"
      api/profile: default
      app/profile: default
    quotas:
      default/interval/duration: "3600"
      default/interval/queries: "0"
      default/interval/errors: "0"
      default/interval/result_rows: "0"
      default/interval/read_rows: "0"
      default/interval/execution_time: "0"
    settings:
      max_concurrent_queries: "200"
      max_connections: "4096"
      keep_alive_timeout: "3"
      max_server_memory_usage_to_ram_ratio: "0.9"
      max_thread_pool_size: "10000"
      background_pool_size: "4"
      background_message_broker_schedule_pool_size: "10"
      uncompressed_cache_size: "8589934592"
      mark_cache_size: "5368709120"
      mmap_cache_size: "1000"
      compiled_expression_cache_size: "134217728"
      compiled_expression_cache_elements_size: "10000"
      user_scripts_path: /usr/local/share/posthog/user_scripts/
      builtin_dictionaries_reload_interval: "3600"
      max_session_timeout: "3600"
      default_session_timeout: "60"
      merge_tree/max_bytes_to_merge_at_max_space_in_pool: "1073741824"
      merge_tree/number_of_free_entries_in_pool_to_execute_mutation: "2"
      merge_tree/number_of_free_entries_in_pool_to_execute_optimize_entire_partition: "2"
      logger/level: warning
    zookeeper:
      nodes:
        - host: chk-posthog-keeper-keeper-0-0
          port: 2181
    clusters:
      - name: posthog
        secret:
          auto: "true"
        layout:
          shardsCount: 1
          replicasCount: 1
    files:
      config.d/posthog_macros.xml: |
        <clickhouse>
          <macros>
            <hostClusterType>online</hostClusterType>
            <hostClusterRole>data</hostClusterRole>
          </macros>
        </clickhouse>
      config.d/posthog_remote_servers.xml: |
        <clickhouse>
          <remote_servers>
            <posthog_single_shard>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </posthog_single_shard>
            <posthog_migrations>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </posthog_migrations>
            <posthog_writable>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </posthog_writable>
            <posthog_primary_replica>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </posthog_primary_replica>
            <ai_events>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </ai_events>
            <aux>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </aux>
            <ops>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </ops>
            <sessions>
              <shard>
                <replica>
                  <host>chi-posthog-posthog-0-0</host>
                  <port>9000</port>
                </replica>
              </shard>
            </sessions>
          </remote_servers>
        </clickhouse>
      config.d/posthog_system_logs.xml: |
        <clickhouse>
          <crash_log>
            <database>system</database>
            <table>crash_log</table>
            <flush_interval_milliseconds>1000</flush_interval_milliseconds>
            <flush_on_crash>true</flush_on_crash>
          </crash_log>
          <error_log>
            <database>system</database>
            <table>error_log</table>
            <flush_interval_milliseconds>1000</flush_interval_milliseconds>
            <collect_interval_milliseconds>1000</collect_interval_milliseconds>
          </error_log>
          <metric_log>
            <database>system</database>
            <table>metric_log</table>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
            <collect_interval_milliseconds>1000</collect_interval_milliseconds>
          </metric_log>
        </clickhouse>
      config.d/named_collections.xml: |
        <clickhouse>
          <named_collections>
            <msk_cluster>
              <kafka_broker_list from_env="KAFKA_HOSTS"/>
            </msk_cluster>
            <warpstream_ingestion>
              <kafka_broker_list from_env="KAFKA_HOSTS"/>
            </warpstream_ingestion>
            <warpstream_calculated_events>
              <kafka_broker_list from_env="KAFKA_HOSTS"/>
            </warpstream_calculated_events>
            <warpstream_replay>
              <kafka_broker_list from_env="KAFKA_HOSTS"/>
            </warpstream_replay>
            <warpstream_shared>
              <kafka_broker_list from_env="KAFKA_HOSTS"/>
            </warpstream_shared>
          </named_collections>
        </clickhouse>
  templates:
    podTemplates:
      - name: clickhouse
        spec:
          containers:
            - name: clickhouse
              image: ghcr.io/blitss/posthog-clickhouse:26.4
              imagePullPolicy: IfNotPresent
              env:
                - name: CLICKHOUSE_DB
                  value: posthog
                - name: CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS
                  value: "1"
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: posthog-clickhouse-password
                      key: password
                - name: KAFKA_HOSTS
                  value: posthog-redpanda.posthog.svc.cluster.local:9093
              volumeMounts:
                - name: initdb
                  mountPath: /docker-entrypoint-initdb.d
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  cpu: "1"
                  memory: 4Gi
          volumes:
            - name: initdb
              configMap:
                name: posthog-clickhouse-initdb
    volumeClaimTemplates:
      - name: data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
