apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: posthog
spec:
  interval: 5m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: posthog-chart
  dependsOn:
    - name: clickhouse-operator
  install:
    ## Skip Flux's stalled-resource wait — web/cymbal/worker need the create-buckets
    ## and migrate hooks to complete first, which happens after resource apply.
    ## Helm hooks themselves still run and are waited on.
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    disableWait: true
    remediation:
      retries: 5
  values:
    ingress:
      enabled: true
      hostname: posthog.example.com
      nginx:
        enabled: false
      traefik:
        enabled: false
      gateway:
        enabled: true
        gatewayName: posthog-gateway
        gatewayNamespace: traefik
        listenerName: posthog-https

    posthog:
      optOutCapture: true
      image:
        repository: docker.io/posthog/posthog
        tag: latest@sha256:9c93fc9fcb7211dfd5f56f8ebdd079f8a9ae7287c91fde7fc91baceecbc21223
      env:
        # Allows creating multiple organizations in your instance (multi-tenancy). Requires a premium license.
        MULTI_ORG_ENABLED: "0"
      secretEnv:
        OIDC_RSA_PRIVATE_KEY:
          name: posthog-oidc-generated
          key: tls.key
    web:
      enabled: true
      image:
        repository: docker.io/posthog/posthog
        tag: latest@sha256:9c93fc9fcb7211dfd5f56f8ebdd079f8a9ae7287c91fde7fc91baceecbc21223
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 8Gi

    ## PostgreSQL — CNPG (external)
    postgresql:
      enabled: false
    externalPostgresql:
      host: posthog-pg-rw
      port: 5432
      database: posthog
      personsDatabase: posthog_persons
      cyclotronDatabase: cyclotron
      secretName: posthog-pg-app
      usernameKey: username
      passwordKey: password

    ## ClickHouse — Altinity operator (external)
    clickhouse:
      enabled: false
      database: posthog
    externalClickhouse:
      host: clickhouse-posthog.posthog.svc.cluster.local
      user: default
      apiUser: api
      appUser: app
      logsDatabase: default
      cluster: posthog
      secretName: posthog-clickhouse-password
      secretPasswordKey: password

    ## Kafka — Redpanda via operator (external)
    kafka:
      enabled: false
    externalKafka:
      brokers: posthog-redpanda.posthog.svc.cluster.local:9093

    ## Redis — bundled via chart. Elasticsearch is managed by ECK.
    redis:
      enabled: true
    elasticsearch:
      enabled: false
    externalElasticsearch:
      host: posthog-elastic-es-http.posthog.svc.cluster.local
      scheme: http
      user: elastic
      secretName: posthog-elastic-es-elastic-user
      passwordKey: elastic
      version: v8
    zookeeper:
      enabled: false
    minio:
      enabled: false
    rustfs:
      enabled: true
    seaweedfs:
      enabled: false
    objectStorage:
      enabled: true
    externalObjectStorage:
      # The chart uses the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    externalSeaweedfs:
      # Session recordings also target the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    temporal:
      enabled: true
      server:
        image:
          repository: docker.io/temporalio/auto-setup
          tag: "1.29.6@sha256:d33d1402e8b895329e27a0d0e7cc2f034e0aa70f0dab6aa95b306d7ae2716f67"
      adminTools:
        image:
          repository: docker.io/temporalio/admin-tools
          tag: "1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e"
      ui:
        image:
          repository: docker.io/temporalio/ui
          tag: "2.49.1@sha256:a066bdf5c4de689cabaf80cc357871f1db5e6d750a6bcfc42e877b913e31ef24"
    worker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:1ac86c19564d1cf92acbec7c80a8c952d6c0a4493025973f07e41705c05ae696
        pullPolicy: Always
      replicas: 1
      concurrency: 2
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 8Gi
    workerBeat:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:1ac86c19564d1cf92acbec7c80a8c952d6c0a4493025973f07e41705c05ae696
        pullPolicy: Always
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 6Gi
    workerExports:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker-exports
        tag: latest@sha256:78554b2ac18e450d411921ce11befd9a59a45cae9a2e8d2fcf720bfd55ae8811
        pullPolicy: Always
      replicas: 1
      queue: exports
      concurrency: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 8Gi
    temporalDjangoWorker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:1ac86c19564d1cf92acbec7c80a8c952d6c0a4493025973f07e41705c05ae696
        pullPolicy: Always
      replicas: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 4Gi
    migrate:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest@sha256:cf74f0ef7e421a03cb2712eba569af16eccc6ed00a315f5669c1d3e958adc41b
        pullPolicy: Always
    asyncMigrationsCheck:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest@sha256:cf74f0ef7e421a03cb2712eba569af16eccc6ed00a315f5669c1d3e958adc41b
        pullPolicy: Always
    plugins:
      image:
        repository: docker.io/posthog/posthog-node
        tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
    capture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:51202b7475c86204905273a7fe7202da435c10a090064bb30ca5efe13a9e7eec
    replayCapture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:51202b7475c86204905273a7fe7202da435c10a090064bb30ca5efe13a9e7eec
    captureAi:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:51202b7475c86204905273a7fe7202da435c10a090064bb30ca5efe13a9e7eec
    captureLogs:
      image:
        repository: ghcr.io/posthog/posthog/capture-logs
        tag: master@sha256:21091237f6a74ef0049d6cc23b0631de31c22187426eb9f638f32b885663cbfb
    featureFlags:
      image:
        repository: ghcr.io/posthog/posthog/feature-flags
        tag: master@sha256:ed94fc16d394a28714f6bb17a944170c3a3a705c184a5e2f8949825f20ab25ee
    propertyDefsRs:
      image:
        repository: ghcr.io/posthog/posthog/property-defs-rs
        tag: master@sha256:a87bfb72bd26540ce04919101864dc2dd77455454dcd4bd04749f0d46178e5cf
    livestream:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/livestream
        tag: master@sha256:211f1d57e9f19729318ab306b90fe75d18a143d93230e8c68293a5f1c34867f4
    cymbal:
      image:
        repository: ghcr.io/posthog/posthog/cymbal
        tag: master@sha256:7f62ca286963d8c13aa716d0936c192c31e104b72205699c64109e29b4915ce2
    cyclotronJanitor:
      image:
        repository: ghcr.io/posthog/posthog/cyclotron-janitor
        tag: master@sha256:438239d1650fd7d28b937c301c181cfcd715abc17ac8a12a9718dd1111d5f803
    ## Personhog services — disabled until we have a posthog_persons DB story.
    ## Flip personhog.enabled (and the deployment toggles) once ready, then
    ## bump rolloutPercentage gradually.
    personhog:
      enabled: false
      rolloutPercentage: 0
    personhogReplica:
      enabled: false
      image:
        repository: ghcr.io/posthog/posthog/personhog-replica
        tag: master@sha256:fa7673f3c6115b78d97e6aaa8050e6362c7c6afca8d07cd05e83d888524e885d
    personhogRouter:
      enabled: false
      image:
        repository: ghcr.io/posthog/posthog/personhog-router
        tag: master@sha256:c565cd4711407d20bce37ddf013018ff7cd80be862d85a506d40a4d6502e5bf5
    global:
      containerSecurityContext: {}
      podSecurityContext: {}
    networkPolicies:
      enabled: false
