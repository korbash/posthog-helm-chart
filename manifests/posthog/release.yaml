apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: posthog
spec:
  interval: 5m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: posthog-chart
  dependsOn:
    - name: clickhouse-operator
  install:
    ## Skip Flux's stalled-resource wait — web/cymbal/worker need the create-buckets
    ## and migrate hooks to complete first, which happens after resource apply.
    ## Helm hooks themselves still run and are waited on.
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    disableWait: true
    remediation:
      retries: 5
  values:
    ingress:
      enabled: true
      hostname: posthog.example.com
      nginx:
        enabled: false
      traefik:
        enabled: false
      gateway:
        enabled: true
        gatewayName: posthog-gateway
        gatewayNamespace: traefik
        listenerName: posthog-https

    posthog:
      optOutCapture: true
      image:
        repository: docker.io/posthog/posthog
        tag: latest@sha256:c65363156df88bb12b6d28cb3c6f0ad2a823631327c224c673d8b58eae48521c
      env:
        # Allows creating multiple organizations in your instance (multi-tenancy). Requires a premium license.
        MULTI_ORG_ENABLED: "0"
      secretEnv:
        OIDC_RSA_PRIVATE_KEY:
          name: posthog-oidc-generated
          key: tls.key
    web:
      enabled: true
      image:
        repository: docker.io/posthog/posthog
        tag: latest@sha256:c65363156df88bb12b6d28cb3c6f0ad2a823631327c224c673d8b58eae48521c
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 8Gi

    ## PostgreSQL — CNPG (external)
    postgresql:
      enabled: false
    externalPostgresql:
      host: posthog-pg-rw
      port: 5432
      database: posthog
      personsDatabase: posthog_persons
      cyclotronDatabase: cyclotron
      secretName: posthog-pg-app
      usernameKey: username
      passwordKey: password

    ## ClickHouse — Altinity operator (external)
    clickhouse:
      enabled: false
      database: posthog
    externalClickhouse:
      host: clickhouse-posthog.posthog.svc.cluster.local
      user: default
      apiUser: api
      appUser: app
      logsDatabase: default
      cluster: posthog
      secretName: posthog-clickhouse-password
      secretPasswordKey: password

    ## Kafka — Redpanda via operator (external)
    kafka:
      enabled: false
    externalKafka:
      brokers: posthog-redpanda.posthog.svc.cluster.local:9093

    ## Redis — bundled via chart. Elasticsearch is managed by ECK.
    redis:
      enabled: true
    elasticsearch:
      enabled: false
    externalElasticsearch:
      host: posthog-elastic-es-http.posthog.svc.cluster.local
      scheme: http
      user: elastic
      secretName: posthog-elastic-es-elastic-user
      passwordKey: elastic
      version: v8
    zookeeper:
      enabled: false
    minio:
      enabled: false
    rustfs:
      enabled: true
    seaweedfs:
      enabled: false
    objectStorage:
      enabled: true
    externalObjectStorage:
      # The chart uses the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    externalSeaweedfs:
      # Session recordings also target the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    temporal:
      enabled: true
      server:
        image:
          repository: docker.io/temporalio/auto-setup
          tag: "1.29.5@sha256:7eaaed21322c8bc98977fab38873847958024e01ffcc1efeffcd474c4f6461ca"
      adminTools:
        image:
          repository: docker.io/temporalio/admin-tools
          tag: "1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
      ui:
        image:
          repository: docker.io/temporalio/ui
          tag: "2.48.1@sha256:edb5dd1b3e0ddb35611939dde9b573533afd6fbafbbf077b73c7131a30ca91ff"
    worker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest
        pullPolicy: Always
      replicas: 1
      concurrency: 2
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 8Gi
    workerBeat:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest
        pullPolicy: Always
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 6Gi
    workerExports:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker-exports
        tag: latest
        pullPolicy: Always
      replicas: 1
      queue: exports
      concurrency: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 8Gi
    temporalDjangoWorker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest
        pullPolicy: Always
      replicas: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 4Gi
    migrate:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest
        pullPolicy: Always
    asyncMigrationsCheck:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest
        pullPolicy: Always
    plugins:
      image:
        repository: docker.io/posthog/posthog-node
        tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
    capture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:3025464aed4d316f729bb85ab798416aa295f947b8ea86f62d2300f1eac7dec5
    replayCapture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:3025464aed4d316f729bb85ab798416aa295f947b8ea86f62d2300f1eac7dec5
    captureAi:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:3025464aed4d316f729bb85ab798416aa295f947b8ea86f62d2300f1eac7dec5
    captureLogs:
      image:
        repository: ghcr.io/posthog/posthog/capture-logs
        tag: master@sha256:13bb230987f091a2a426a1b5531eef04ce30b5f0b4bb7128b5c3ba667718475c
    featureFlags:
      image:
        repository: ghcr.io/posthog/posthog/feature-flags
        tag: master@sha256:607cf70a5808d089abd7b3ee493314e16651351e9dbbd831b2d4e1dd96a495e4
    propertyDefsRs:
      image:
        repository: ghcr.io/posthog/posthog/property-defs-rs
        tag: master@sha256:fc6c59d5f1f2355a1d4d18641651aa4afcbda4b16e99fe3ab32751d4f924b4b7
    livestream:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/livestream
        tag: master@sha256:cd1c09922dadca934beb580a727dbbd8aeb572e821c580f3990a707022d2e0be
    cymbal:
      image:
        repository: ghcr.io/posthog/posthog/cymbal
        tag: master@sha256:57b7e1bfe4e2e20f749e5de15b834e73d2a8f2a89fe0bfea08126cf319e774ec
    cyclotronJanitor:
      image:
        repository: ghcr.io/posthog/posthog/cyclotron-janitor
        tag: master@sha256:c672a970c9597b94f04b721e1717a054f32073d885c9b76259b9cf33461240dc
    ## Personhog services — disabled until we have a posthog_persons DB story.
    ## Flip personhog.enabled (and the deployment toggles) once ready, then
    ## bump rolloutPercentage gradually.
    personhog:
      enabled: false
      rolloutPercentage: 0
    personhogReplica:
      enabled: false
      image:
        repository: ghcr.io/posthog/posthog/personhog-replica
        tag: master
    personhogRouter:
      enabled: false
      image:
        repository: ghcr.io/posthog/posthog/personhog-router
        tag: master
    global:
      containerSecurityContext: {}
      podSecurityContext: {}
    networkPolicies:
      enabled: false
