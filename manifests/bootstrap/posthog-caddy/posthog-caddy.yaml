apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: posthog-caddy
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 45m
  prune: true
  dependsOn:
    - name: posthog-infra
  sourceRef:
    kind: GitRepository
    name: posthog-helm-chart
  path: ./manifests/posthog-caddy
  wait: true
