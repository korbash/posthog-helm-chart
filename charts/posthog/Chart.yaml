apiVersion: v2
name: posthog
description: A Helm chart to deploy PostHog - open-source product analytics platform
type: application
version: 0.19.2
appVersion: latest  # PostHog uses continuous deployment; no semver releases
kubeVersion: '>= 1.23.0-0'
keywords:
- posthog
- analytics
- product-analytics
- event-tracking
home: https://posthog.com
sources:
- https://github.com/PostHog/posthog
maintainers:
- name: posthog
  url: https://posthog.com

dependencies:
  - name: kafka
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 29.3.14
    condition: kafka.enabled
  - name: rustfs
    repository: https://charts.rustfs.com
    version: 0.0.91
    condition: rustfs.enabled
