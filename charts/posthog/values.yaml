## Personhog — gRPC backend that serves persons reads from a replicated
## Postgres. Web/worker call into it at a progressive rollout percentage.
## Disabled by default; enable once you've decided on a posthog_persons DB
## story and brought the replica + router up.
personhog:
  enabled: false
  ## When unset, defaults to the personhog-router Service inside the cluster.
  addr: ''
  rolloutPercentage: 0
personhogReplica:
  enabled: false
  image:
    repository: ghcr.io/posthog/posthog/personhog-replica
    tag: master
    pullPolicy: Always
  replicas: 1
  ## gRPC and Prometheus metrics ports.
  grpcPort: 50051
  metricsPort: 9100
  rustLog: info
  ## gRPC connections benefit from drain time on rolling updates / node drains.
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
personhogRouter:
  enabled: false
  image:
    repository: ghcr.io/posthog/posthog/personhog-router
    tag: master
    pullPolicy: Always
  replicas: 1
  grpcPort: 50052
  metricsPort: 9101
  backendTimeoutMs: 5000
  rustLog: info
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  podSecurityContext: {}
  containerSecurityContext: {}
