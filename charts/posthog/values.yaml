## ------------------------------------------------------------------
## PostHog Helm Chart - values.yaml
## ------------------------------------------------------------------

## Global overrides
nameOverride: ''
fullnameOverride: ''
## ------------------------------------------------------------------
## Global production settings
## ------------------------------------------------------------------
global:
  ## Image pull secrets for private registries
  imagePullSecrets: []
  # - name: my-registry-secret

  ## Default security context applied to all pods unless overridden per-component
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  ## Default container security context applied to all containers unless overridden
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false # PostHog Django needs writable tmpdir
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
  ## Default scheduling constraints applied to all pods unless overridden
  nodeSelector: {}
  tolerations: []
  affinity: {}
  ## Default pod annotations applied to all pods unless overridden
  podAnnotations: {}
  ## Extra environment variables injected into all PostHog app containers
  extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"
## ------------------------------------------------------------------
## ServiceAccount
## ------------------------------------------------------------------
serviceAccount:
  create: true
  name: ''
  annotations: {}
  ## For IRSA (AWS), Workload Identity (GCP), etc.
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role
## ------------------------------------------------------------------
## PostHog application settings
## ------------------------------------------------------------------
posthog:
  ## Default image for Python-based PostHog workloads.
  ## Component-specific image overrides (web.image, worker.image,
  ## workerExports.image, temporalDjangoWorker.image, migrate.image,
  ## asyncMigrationsCheck.image, bootstrapClickhouse.image) fall back here when
  ## left empty.
  ## PostHog does not publish versioned Docker tags — they use continuous
  ## deployment. "latest" tracks the main branch. Set pullPolicy: Always to pick
  ## up new versions.
  image:
    repository: posthog/posthog
    tag: latest
    pullPolicy: Always
  ## Django secret key (auto-generated if empty)
  secret: ''
  ## Encryption salt (auto-generated if empty)
  encryptionSaltKeys: ''
  ## Set to "true" to disable anonymous telemetry
  optOutCapture: 'false'
  ## Additional upstream PostHog self-host environment variables injected into
  ## all PostHog application containers. Keys are literal env var names.
  ##
  ## Use `posthog.env` for plain values and `posthog.secretEnv` for values that
  ## should come from Kubernetes Secrets. `posthog.secretEnv` entries have the
  ## form:
  ##   OIDC_RSA_PRIVATE_KEY:
  ##     name: posthog-oidc
  ##     key: oidc-rsa-private-key
  ##     optional: false
  ##
  ## Examples:
  ##   env:
  ##     SITE_URL: https://posthog.example.com
  ##     SECURE_COOKIES: "true"
  ##     IS_BEHIND_PROXY: "true"
  ##     TRUSTED_PROXIES: "10.0.0.0/8,192.168.0.0/16"
  ##     ALLOWED_HOSTS: posthog.example.com
  ##     MULTI_ORG_ENABLED: "1"
  ##   secretEnv:
  ##     GITHUB_TOKEN:
  ##       name: posthog-github
  ##       key: token
  ##     OIDC_RSA_PRIVATE_KEY:
  ##       name: posthog-oidc
  ##       key: oidc-rsa-private-key
  ##
  ## Selected upstream settings and defaults:
  ##   SECRET_KEY: Required in production; Django cryptography key. Default: randomly generated.
  ##   SITE_URL: Required absolute canonical URL. Default: http://localhost:8000.
  ##   SECURE_COOKIES: Secure Django cookies. Default: false in DEBUG/TEST, otherwise true.
  ##   IS_BEHIND_PROXY: Proxy-aware mode. Default: false.
  ##   ALLOWED_IP_BLOCKS: Management IP allowlist. Default: empty.
  ##   TRUSTED_PROXIES: Trusted proxy IPs/CIDRs. Default: none.
  ##   TRUST_ALL_PROXIES: Trust every proxy hop. Default: false.
  ##   ALLOWED_HOSTS: Django allowed hosts. Default: *.
  ##   SKIP_SERVICE_VERSION_REQUIREMENTS: Disable dependency version checks. Default: false.
  ##   ACTION_EVENT_MAPPING_INTERVAL_SECONDS: Action-event match interval. Default: 300.
  ##   ASYNC_EVENT_ACTION_MAPPING: Batch action matching. Default: false.
  ##   CAPTURE_INTERNAL_METRICS: Send internal metrics to your own instance. Default: false.
  ##   DATABASE_URL: PostgreSQL URL. Default: required outside DEBUG/TEST.
  ##   DEBUG_QUERIES: Enable query debugging UI. Default: false.
  ##   DEBUG: Django debug mode. Default: false.
  ##   CLICKHOUSE_DISABLE_EXTERNAL_SCHEMAS: Disable ProtoBuf schemas. Default: false.
  ##   DISABLE_PAID_FEATURE_SHOWCASING: Disable premium feature upsell UI. Default: false.
  ##   DISABLE_SECURE_SSL_REDIRECT: Disable HTTP->HTTPS redirect. Default: false.
  ##   GITHUB_TOKEN: GitHub PAT for app installs/rate limits. Default: none.
  ##   GITLAB_TOKEN: GitLab PAT for app installs/rate limits. Default: none.
  ##   JS_URL: Absolute webpack asset URL. Default: required outside DEBUG.
  ##   KAFKA_URL: Kafka application URL. Default: kafka://kafka.
  ##   KAFKA_URL_FOR_CLICKHOUSE: Kafka URL used by ClickHouse. Default: falls back to KAFKA_URL.
  ##   MATERIALIZE_COLUMNS_ANALYSIS_PERIOD_HOURS: Default: 168.
  ##   MATERIALIZE_COLUMNS_BACKFILL_PERIOD_DAYS: Default: 90.
  ##   MATERIALIZE_COLUMNS_MAX_AT_ONCE: Default: 10.
  ##   MATERIALIZE_COLUMNS_MINIMUM_QUERY_TIME: Default: 3000.
  ##   MATERIALIZE_COLUMNS_SCHEDULE_CRON: Default: 0 5 * * SAT.
  ##   MULTI_ORG_ENABLED: Multi-tenancy support. Default: false.
  ##   NPM_TOKEN: npm token for private app packages. Default: none.
  ##   OPT_OUT_CAPTURE: Disable product usage telemetry. Default: false.
  ##   POSTHOG_DB_NAME / POSTHOG_DB_USER / POSTHOG_DB_PASSWORD /
  ##   POSTHOG_POSTGRES_HOST / POSTHOG_POSTGRES_PORT: Split PostgreSQL config when DATABASE_URL is not used.
  ##   POSTHOG_POSTGRES_CLI_SSL_CA / POSTHOG_POSTGRES_CLI_SSL_CRT /
  ##   POSTHOG_POSTGRES_CLI_SSL_KEY / POSTHOG_POSTGRES_SSL_MODE: PostgreSQL SSL client settings.
  ##   REDIS_URL: Redis URL. Default: required outside DEBUG/TEST.
  ##   SOCIAL_AUTH_GITHUB_KEY / SOCIAL_AUTH_GITHUB_SECRET: GitHub SSO. Default: empty.
  ##   SOCIAL_AUTH_GITLAB_API_URL: GitLab auth base URL. Default: https://gitlab.com.
  ##   SOCIAL_AUTH_GITLAB_KEY / SOCIAL_AUTH_GITLAB_SECRET: GitLab SSO. Default: empty.
  ##   SOCIAL_AUTH_GOOGLE_OAUTH2_KEY / SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET: Google SSO. Default: empty.
  ##   STATSD_HOST / STATSD_PORT / STATSD_PREFIX: StatsD metrics output. Defaults: none / 8125 / empty.
  ##   TEAM_NEGATIVE_CACHE_CAPACITY: Default: 10000.
  ##   TEAM_NEGATIVE_CACHE_TTL_SECONDS: Default: 300.
  ##   CLEAR_CLICKHOUSE_REMOVED_DATA_SCHEDULE_CRON: Default: 0 5 * * SAT.
  ##   LOG_LEVEL: Plugin server log level. Default: info.
  ##   OBJECT_STORAGE_PUBLIC_ENDPOINT: Public presign URL endpoint. Default: OBJECT_STORAGE_ENDPOINT.
  ##   WORKOS_RADAR_ENABLED: Enable WorkOS Radar. Default: false.
  ##   WORKOS_RADAR_API_KEY: WorkOS Radar API key. Default: empty.
  ##   CLOUDFLARE_TURNSTILE_SITE_KEY / CLOUDFLARE_TURNSTILE_SECRET_KEY:
  ##     Signup CAPTCHA settings. Default: empty.
  ##   EMAIL_* and SLACK_APP_* may also be set here, but are usually better
  ##     managed through PostHog Instance Settings.
  env: {}
  secretEnv: {}
## ------------------------------------------------------------------
## Existing Secrets support
## When set, the chart will NOT create its own Secret and will instead
## reference this existing Kubernetes Secret for all secret values.
## The Secret must contain these keys:
##   posthog-secret, encryption-salt-keys, database-url, redis-url,
##   clickhouse-api-password, clickhouse-app-password,
##   object-storage-access-key, object-storage-secret-key,
##   seaweedfs-access-key, seaweedfs-secret-key, postgresql-password
## ------------------------------------------------------------------
existingSecret: ''
## ------------------------------------------------------------------
## Ingress configuration
## ------------------------------------------------------------------
ingress:
  enabled: true
  ## The hostname PostHog will be served from
  hostname: posthog.example.com
  ## NGINX Ingress
  nginx:
    enabled: true
    className: nginx
    annotations: {}
    tls:
      enabled: true
      secretName: '' # leave empty to use default cluster issuer
  ## Traefik IngressRoute (traefik.io/v1alpha1 CRD)
  traefik:
    enabled: false
    entryPoints:
      - websecure
    annotations: {}
    tls:
      enabled: true
      certResolver: '' # e.g., letsencrypt
      secretName: '' # use an existing TLS secret instead of certResolver
  ## Kubernetes Gateway API HTTPRoute (gateway.networking.k8s.io/v1)
  gateway:
    enabled: false
    gatewayName: posthog-gateway
    gatewayNamespace: traefik
    listenerName: posthog-https
  ## Istio VirtualService (networking.istio.io/v1)
  istio:
    enabled: false
    ## Gateway reference in namespace/name format
    gateway: istio-system/default-gateway
    annotations: {}
  ## OpenShift Route (route.openshift.io/v1)
  openshift:
    enabled: false
    annotations: {}
    tls:
      termination: edge # edge, passthrough, reencrypt
      insecureEdgeTerminationPolicy: Redirect
      ## Optional inline certificate fields (usually managed by the cluster)
      # certificate: ''
      # key: ''
      # caCertificate: ''
## ------------------------------------------------------------------
## PostgreSQL
## ------------------------------------------------------------------
postgresql:
  ## Set to false to use an external PostgreSQL (e.g. CNPG, RDS, Azure Flexible Server)
  enabled: true
  image:
    repository: postgres
    tag: 15.12-alpine
  auth:
    username: posthog
    password: posthog
    database: posthog
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ''
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  ## Per-component overrides (set to {} to use global defaults)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999 # postgres user
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External PostgreSQL (used when postgresql.enabled=false)
externalPostgresql:
  ## Full connection URL: postgres://user:pass@host:port/db
  url: ''
  ## Optional override for the Persons DB URL. Defaults to `url` when empty.
  personsUrl: ''
  ## Optional override for the Cyclotron DB URL.
  cyclotronUrl: ''
  ## Secret-backed alternative to inline URLs for external Postgres.
  ## When `host` is set, the chart will build connection URLs from this
  ## credential secret instead of expecting prebuilt URI keys.
  secretName: ''
  host: ''
  port: 5432
  database: posthog
  personsDatabase: ''
  cyclotronDatabase: cyclotron
  uriKey: uri
  personsUriKey: persons-uri
  cyclotronUriKey: cyclotron-uri
  usernameKey: username
  passwordKey: password
  ## Password for external PostgreSQL (used by Temporal and other consumers
  ## that need the password separately from the full URL)
  password: ''
## ------------------------------------------------------------------
## ClickHouse
## ------------------------------------------------------------------
clickhouse:
  ## Simple bundled ClickHouse (single-node StatefulSet).
  ## Set to false for production — use externalClickhouse with an operator or managed service.
  enabled: true
  image:
    repository: ghcr.io/blitss/posthog-clickhouse
    tag: 25.9.7
  database: posthog
  secure: false
  verify: false
  apiUser: api
  apiPassword: apipass
  appUser: app
  appPassword: apppass
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ''
  resources:
    requests:
      cpu: '1'
      memory: 4Gi
    limits:
      memory: 8Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101 # clickhouse user
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External ClickHouse (used when clickhouse.enabled=false)
externalClickhouse:
  host: ''
  user: ''
  apiUser: ''
  appUser: ''
  ## Cluster name used for all cluster env vars (CLICKHOUSE_CLUSTER,
  ## CLICKHOUSE_MIGRATIONS_CLUSTER, CLICKHOUSE_WRITABLE_CLUSTER, etc.).
  ## Override individual cluster names only for advanced multi-shard setups.
  cluster: default
  migrationsCluster: '' # defaults to cluster
  singleShardCluster: '' # defaults to cluster
  writableCluster: '' # defaults to cluster
  primaryReplicaCluster: '' # defaults to cluster
  logsCluster: '' # defaults to singleShardCluster → cluster
  logsDatabase: default
  logsPort: 9000
  satelliteClusters: ''
  secretName: ''
  secretPasswordKey: password
  createDatabase: true
## ------------------------------------------------------------------
## Redis
## ------------------------------------------------------------------
redis:
  ## Set to false to use an external Redis (e.g. Dragonfly, ElastiCache, Azure Cache)
  enabled: true
  image:
    repository: redis
    tag: 7.2-alpine
  maxmemory: 200mb
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ''
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999 # redis user
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External Redis (used when redis.enabled=false)
externalRedis:
  ## Full URL: redis://[:password@]host:port/
  url: ''
## ------------------------------------------------------------------
## Kafka (Redpanda)
## ------------------------------------------------------------------
kafka:
  ## Set to false to use an external Kafka
  enabled: true
  ## Bitnami Kafka chart values (subchart)
  ## https://github.com/bitnami/charts/tree/main/bitnami/kafka
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
    persistence:
      enabled: true
      size: 20Gi
  broker:
    replicaCount: 0
  kraft:
    enabled: true
  zookeeper:
    enabled: false
  provisioning:
    enabled: true
    replicationFactor: 1
    ## PostHog required Kafka topics
    ## Sources:
    ##   https://github.com/PostHog/posthog/blob/master/posthog/kafka_client/topics.py
    ##   https://github.com/PostHog/posthog/blob/master/nodejs/src/config/kafka-topics.ts
    topics:
      - name: cdp_backfill_events
      - name: cdp_batch_hogflow_requests
      - name: cdp_data_warehouse_source_table
      - name: cdp_function_overflow
      - name: cdp_internal_events
      - name: clickhouse_ai_events_json
      - name: clickhouse_app_metrics
      - name: clickhouse_app_metrics2
      - name: clickhouse_behavioral_cohorts_matches
      - name: clickhouse_document_embeddings
      - name: clickhouse_error_tracking_issue_fingerprint
      - name: clickhouse_error_tracking_issue_fingerprint_embeddings
      - name: clickhouse_error_tracking_issue_fingerprint_overrides
      - name: clickhouse_events_json
      - name: clickhouse_groups
      - name: clickhouse_heatmap_events
      - name: clickhouse_ingestion_warnings
      - name: clickhouse_logs
      - name: clickhouse_metrics_time_to_see_data
      - name: clickhouse_performance_events
      - name: clickhouse_person
      - name: clickhouse_person_distinct_id
      - name: clickhouse_person_distinct_id2
      - name: clickhouse_person_distinct_id_overrides
      - name: clickhouse_person_override
      - name: clickhouse_person_overrides
      - name: clickhouse_person_unique_id
      - name: clickhouse_precalculated_person_properties
      - name: clickhouse_prefiltered_events
      - name: clickhouse_session_recording_events
      - name: clickhouse_session_replay_events
      - name: clickhouse_tophog
      - name: clickhouse_traces
      - name: cohort_membership_changed
      - name: cohort_membership_changed_trigger
      - name: conversion_events_buffer
      - name: data_warehouse_source_webhooks
      - name: data_warehouse_source_webhooks_dlq
      - name: data_warehouse_sources_jobs
      - name: data_warehouse_sources_jobs_dlq
      - name: distinct_id_usage_events_json
      - name: document_embeddings_input
      - name: events_dead_letter_queue
      - name: events_plugin_ingestion
      - name: events_plugin_ingestion_async
      - name: events_plugin_ingestion_dlq
      - name: events_plugin_ingestion_historical
      - name: events_plugin_ingestion_overflow
      - name: exceptions_ingestion
      - name: ingestion-errortracking-main
      - name: ingestion-errortracking-main-dlq
      - name: ingestion-errortracking-overflow
      - name: ingestion-traces
      - name: ingestion-traces-dlq
      - name: ingestion-traces-overflow
      - name: kafka_events_recent_json
      - name: log_entries
      - name: log_entries_v2_test
      - name: logs_ingestion
      - name: logs_ingestion_dlq
      - name: logs_ingestion_overflow
      - name: notification_events
      - name: plugin_log_entries
      - name: session_recording_events
      - name: session_recording_snapshot_item_dlq
      - name: session_recording_snapshot_item_events
      - name: session_recording_snapshot_item_overflow
      - name: signals_report_completed
  extraConfig: |
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    offsets.topic.replication.factor=1
  logRetention:
    hours: 1
## External Kafka (used when kafka.enabled=false)
externalKafka:
  brokers: '' # e.g. "kafka-1:9092,kafka-2:9092"
## ------------------------------------------------------------------
## ZooKeeper (for bundled ClickHouse coordination)
## Ignored when clickhouse.enabled=false — external ClickHouse brings
## its own keeper/zookeeper.
## ------------------------------------------------------------------
zookeeper:
  enabled: true
  image:
    repository: zookeeper
    tag: 3.7.0
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ''
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## ------------------------------------------------------------------
## MinIO (S3-compatible object storage)
## ------------------------------------------------------------------
## ------------------------------------------------------------------
## RustFS (S3-compatible object storage)
## ------------------------------------------------------------------
rustfs:
  ## Set to false to use external object storage (e.g. Azure Blob, AWS S3, GCS)
  enabled: true
  ## RustFS subchart values — override as needed.
  ## https://github.com/rustfs/helm
  image:
    rustfs:
      tag: latest
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  secret:
    rustfs:
      access_key: object_storage_root_user
      secret_key: object_storage_root_password
  ingress:
    enabled: false
  storageclass:
    name: ""
    dataStorageSize: 20Gi
    logStorageSize: 256Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
## External object storage (used when rustfs.enabled=false)
externalObjectStorage:
  ## S3-compatible endpoint: https://my-bucket.s3.amazonaws.com
  endpoint: ''
  accessKey: ''
  secretKey: ''
## General object storage toggle
objectStorage:
  enabled: true
  ## External SeaweedFS / session recording S3 (used when rustfs.enabled=false)
  ## When rustfs.enabled=true, session recordings also go to RustFS.
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External SeaweedFS / S3-compatible storage (used when seaweedfs.enabled=false)
externalSeaweedfs:
  endpoint: ''
  accessKey: ''
  secretKey: ''
## ------------------------------------------------------------------
## Elasticsearch (for Temporal)
## ------------------------------------------------------------------
elasticsearch:
  enabled: true
  image:
    repository: elasticsearch
    tag: 7.17.28
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ''
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External Elasticsearch (used when elasticsearch.enabled=false)
externalElasticsearch:
  host: '' # e.g. posthog-es-elasticsearch
  scheme: http
  user: ''
  password: ''
  secretName: ''
  passwordKey: password
  version: v7 # v7 or v8
## ------------------------------------------------------------------
## Temporal (workflow orchestration)
## ------------------------------------------------------------------
temporal:
  enabled: true
  server:
    image:
      repository: temporalio/auto-setup
      tag: 1.20.0
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi
  adminTools:
    image:
      repository: temporalio/admin-tools
      tag: 1.20.0
  ui:
    enabled: true
    image:
      repository: temporalio/ui
      tag: 2.31.2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
## External Temporal (used when temporal.enabled=false)
externalTemporal:
  host: ''
## ------------------------------------------------------------------
## GeoIP MMDB distribution service
## ------------------------------------------------------------------
geoip:
  ## Enable a central pod that downloads (or mounts) the MaxMind MMDB file
  ## and serves it over HTTP. Consumers (feature-flags, livestream, cymbal)
  ## fetch the file from this service via init containers.
  enabled: true
  ## URL to download the MMDB file from (used when existingPvc is not set).
  ## Default is the PostHog CDN which serves brotli-compressed MMDB.
  downloadUrl: 'https://mmdbcdn.posthog.net/'
  ## Set to true when the downloadUrl serves brotli-compressed data
  brotli: true
  ## Filename served over HTTP and written into consumer pods
  filename: GeoLite2-City.mmdb
  ## Image used for the download init container
  image: alpine:3.21
  ## Mount an existing PVC instead of downloading.
  ## The PVC must contain the MMDB file at its root.
  # existingPvc: geoip-db
## ------------------------------------------------------------------
## PostHog Core Services
## ------------------------------------------------------------------
web:
  enabled: true
  image: {}
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  ## Granian was removed from the production posthog/posthog image in
  ## PostHog#54394 (2026-04). When enabled, the chart sets `command:
  ## granian ...` directly, which fails on current images. Default off
  ## so the image's built-in Nginx Unit entrypoint runs instead.
  granian:
    enabled: false
    workers: 2
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  sidecarContainers: []
  ## HPA settings
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ## PDB settings
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1
worker:
  enabled: true
  image: {}
  replicas: 1
  ## Optional comma-separated queue list. Leave empty to use the worker image's
  ## upstream queue defaults.
  queues: ''
  ## Celery prefork concurrency. Defaults to 4 to avoid spawning a process per
  ## CPU core which leads to OOM on large nodes.
  concurrency: 4
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  sidecarContainers: []
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
workerBeat:
