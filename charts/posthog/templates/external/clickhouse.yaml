{{- if .Values.clickhouse.enabled }}
{{- $fullname := include "posthog.fullname" . -}}
{{- $kafkaBrokers := .Values.externalKafka.brokers | default (printf "%s-kafka:9092" $fullname) -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: native
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "clickhouse") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "clickhouse") | nindent 6 }}
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "clickhouse") | nindent 10 }}
          ports:
            - containerPort: 9000
              name: native
            - containerPort: 8123
              name: http
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.database | quote }}
            - name: KAFKA_HOSTS
              value: {{ $kafkaBrokers | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-server-config
              mountPath: /etc/clickhouse-server/config.d/posthog.xml
              subPath: posthog.xml
            - name: clickhouse-server-config
              mountPath: /etc/clickhouse-server/config.d/cluster.xml
              subPath: cluster.xml
            - name: clickhouse-users-config
              mountPath: /etc/clickhouse-server/users.d/posthog.xml
              subPath: posthog-users.xml
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: clickhouse-server-config
          configMap:
            name: {{ $fullname }}-clickhouse-config
        - name: clickhouse-users-config
          secret:
            secretName: {{ $fullname }}-clickhouse-users
        {{- if not .Values.clickhouse.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
  {{- end }}
---
## PostHog ClickHouse server config — tuning + deployment-specific topology.
## Profile settings from https://github.com/PostHog/posthog/blob/master/docker/clickhouse/config.xml
## Cluster topology from https://github.com/PostHog/posthog/blob/master/docker/clickhouse/config.d/default.xml
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-clickhouse-config
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
data:
  posthog.xml: |
    <clickhouse>
      <logger>
        <level>warning</level>
        <log>/var/log/clickhouse-server/clickhouse-server.log</log>
        <errorlog>/var/log/clickhouse-server/clickhouse-server.err.log</errorlog>
        <size>1000M</size>
        <count>10</count>
      </logger>

      <max_connections>4096</max_connections>
      <keep_alive_timeout>3</keep_alive_timeout>
      <max_concurrent_queries>200</max_concurrent_queries>
      <max_server_memory_usage>0</max_server_memory_usage>
      <max_server_memory_usage_to_ram_ratio>0.9</max_server_memory_usage_to_ram_ratio>

      <max_thread_pool_size>10000</max_thread_pool_size>
      <background_pool_size>4</background_pool_size>
      <background_message_broker_schedule_pool_size>10</background_message_broker_schedule_pool_size>

      <total_memory_profiler_step>4194304</total_memory_profiler_step>
      <total_memory_tracker_sample_probability>0</total_memory_tracker_sample_probability>

      <uncompressed_cache_size>8589934592</uncompressed_cache_size>
      <mark_cache_size>5368709120</mark_cache_size>
      <mmap_cache_size>1000</mmap_cache_size>
      <compiled_expression_cache_size>134217728</compiled_expression_cache_size>
      <compiled_expression_cache_elements_size>10000</compiled_expression_cache_elements_size>

      <mlock_executable>true</mlock_executable>
      <remap_executable>false</remap_executable>

      <remote_url_allow_hosts>
        <host_regexp>.*</host_regexp>
      </remote_url_allow_hosts>

      <builtin_dictionaries_reload_interval>3600</builtin_dictionaries_reload_interval>
      <max_session_timeout>3600</max_session_timeout>
      <default_session_timeout>60</default_session_timeout>

      <dictionaries_config>*_dictionary.xml</dictionaries_config>
      <user_defined_executable_functions_config>*_function.xml</user_defined_executable_functions_config>
      <user_scripts_path>/usr/local/share/posthog/user_scripts/</user_scripts_path>

      <distributed_ddl>
        <path>/clickhouse/task_queue/ddl</path>
      </distributed_ddl>

      <merge_tree>
        <max_bytes_to_merge_at_max_space_in_pool>1073741824</max_bytes_to_merge_at_max_space_in_pool>
        <number_of_free_entries_in_pool_to_execute_mutation>2</number_of_free_entries_in_pool_to_execute_mutation>
        <number_of_free_entries_in_pool_to_execute_optimize_entire_partition>2</number_of_free_entries_in_pool_to_execute_optimize_entire_partition>
      </merge_tree>

      <query_log>
        <database>system</database>
        <table>query_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>500</flush_interval_milliseconds>
        <max_size_rows>8388608</max_size_rows>
        <reserved_size_rows>8192</reserved_size_rows>
        <buffer_size_rows_flush_threshold>524288</buffer_size_rows_flush_threshold>
        <flush_on_crash>true</flush_on_crash>
        <ttl>event_date + INTERVAL 12 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </query_log>

      <query_thread_log>
        <database>system</database>
        <table>query_thread_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <max_size_rows>8388608</max_size_rows>
        <reserved_size_rows>8192</reserved_size_rows>
        <buffer_size_rows_flush_threshold>524288</buffer_size_rows_flush_threshold>
        <flush_on_crash>false</flush_on_crash>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </query_thread_log>

      <query_views_log>
        <database>system</database>
        <table>query_views_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </query_views_log>

      <text_log>
        <database>system</database>
        <table>text_log</table>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <level>trace</level>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </text_log>

      <metric_log>
        <database>system</database>
        <table>metric_log</table>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <collect_interval_milliseconds>1000</collect_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </metric_log>

      <asynchronous_metric_log>
        <database>system</database>
        <table>asynchronous_metric_log</table>
        <flush_interval_milliseconds>7000</flush_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </asynchronous_metric_log>

      <opentelemetry_span_log>
        <engine>
          engine MergeTree
          partition by toYYYYMM(finish_date)
          order by (finish_date, finish_time_us, trace_id)
        </engine>
        <database>system</database>
        <table>opentelemetry_span_log</table>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
      </opentelemetry_span_log>

      <trace_log>
        <database>system</database>
        <table>trace_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </trace_log>

      <crash_log>
        <database>system</database>
        <table>crash_log</table>
        <partition_by />
        <flush_interval_milliseconds>1000</flush_interval_milliseconds>
        <max_size_rows>1024</max_size_rows>
        <reserved_size_rows>1024</reserved_size_rows>
        <buffer_size_rows_flush_threshold>512</buffer_size_rows_flush_threshold>
        <flush_on_crash>true</flush_on_crash>
      </crash_log>

      <session_log>
        <database>system</database>
        <table>session_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </session_log>

      <backup_log>
        <database>system</database>
        <table>backup_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        <ttl>event_date + INTERVAL 5 DAY</ttl>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
      </backup_log>

      <query_masking_rules>
        <rule>
          <name>hide encrypt/decrypt arguments</name>
          <regexp>((?:aes_)?(?:encrypt|decrypt)(?:_mysql)?)\s*\(\s*(?:'(?:\\'|.)+'|.*?)\s*\)</regexp>
          <replace>\1(???)</replace>
        </rule>
      </query_masking_rules>
    </clickhouse>

  ## Deployment-specific: cluster topology, ZooKeeper, Kafka, macros.
  ## Matches PostHog upstream docker/clickhouse/config.d/default.xml for
  ## a single-node bundled deployment.
  cluster.xml: |
    <clickhouse>
      <zookeeper>
        <node>
          <host>{{ $fullname }}-zookeeper</host>
          <port>2181</port>
        </node>
      </zookeeper>

      <kafka>
        <broker_list>{{ $kafkaBrokers }}</broker_list>
      </kafka>

      <named_collections>
        <msk_cluster>
          <kafka_broker_list>{{ $kafkaBrokers }}</kafka_broker_list>
        </msk_cluster>
        <warpstream_ingestion>
          <kafka_broker_list>{{ $kafkaBrokers }}</kafka_broker_list>
        </warpstream_ingestion>
      </named_collections>

      <remote_servers>
        <posthog>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog>
        <posthog_single_shard>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_single_shard>
        <posthog_migrations>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_migrations>
        <posthog_writable>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_writable>
        <posthog_primary_replica>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </posthog_primary_replica>
        <ai_events>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </ai_events>
        <aux>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </aux>
        <ops>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </ops>
        <sessions>
          <shard>
            <replica>
              <host>{{ $fullname }}-clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </sessions>
      </remote_servers>

      <macros>
        <shard>01</shard>
        <replica>ch1</replica>
        <hostClusterType>online</hostClusterType>
        <hostClusterRole>data</hostClusterRole>
      </macros>
    </clickhouse>
---
## ClickHouse users, profiles, and quotas.
## Passwords are deployment-specific so they live in a Secret, not the image.
## Profile settings from https://github.com/PostHog/posthog/blob/master/docker/clickhouse/users.xml
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-clickhouse-users
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
type: Opaque
stringData:
  posthog-users.xml: |
    <clickhouse>
      <profiles>
        <default>
          <max_memory_usage>10000000000</max_memory_usage>
          <load_balancing>random</load_balancing>
          <allow_nondeterministic_mutations>1</allow_nondeterministic_mutations>
          <enable_analyzer>0</enable_analyzer>
          <compatibility>25.10</compatibility>
          <distributed_product_mode>global</distributed_product_mode>
          <enable_parallel_replicas>0</enable_parallel_replicas>
          <max_parallel_replicas>1</max_parallel_replicas>
          <allow_experimental_window_functions>1</allow_experimental_window_functions>
          <allow_suspicious_low_cardinality_types>1</allow_suspicious_low_cardinality_types>
          <insert_distributed_sync>1</insert_distributed_sync>
          <throw_on_max_partitions_per_insert_block>false</throw_on_max_partitions_per_insert_block>
          <number_of_mutations_to_throw>1</number_of_mutations_to_throw>
          <!-- Disable sampling profiler: trace_log can fill disk under heavy load and PostHog never reads it. -->
          <query_profiler_real_time_period_ns>0</query_profiler_real_time_period_ns>
          <query_profiler_cpu_time_period_ns>0</query_profiler_cpu_time_period_ns>
        </default>
        <readonly>
          <readonly>1</readonly>
        </readonly>
        <api>
          <profile>default</profile>
        </api>
        <app>
          <profile>default</profile>
        </app>
      </profiles>

      <users>
        <default>
          <password></password>
          <networks><ip>::/0</ip></networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
          <named_collection_control>1</named_collection_control>
          <show_named_collections>1</show_named_collections>
          <show_named_collections_secrets>1</show_named_collections_secrets>
        </default>
        <api>
          <password>{{ .Values.clickhouse.apiPassword }}</password>
          <networks><ip>::/0</ip></networks>
          <profile>api</profile>
          <quota>default</quota>
        </api>
        <app>
          <password>{{ .Values.clickhouse.appPassword }}</password>
          <networks><ip>::/0</ip></networks>
          <profile>app</profile>
          <quota>default</quota>
        </app>
      </users>

      <quotas>
        <default>
          <interval>
            <duration>3600</duration>
            <queries>0</queries>
            <errors>0</errors>
            <result_rows>0</result_rows>
            <read_rows>0</read_rows>
            <execution_time>0</execution_time>
          </interval>
        </default>
      </quotas>
    </clickhouse>
{{- end }}
