{{- if .Values.elasticsearch.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-elasticsearch
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-elasticsearch
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "elasticsearch") | nindent 4 }}
spec:
  serviceName: {{ include "posthog.fullname" . }}-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "elasticsearch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "elasticsearch") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "elasticsearch") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "elasticsearch") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "elasticsearch") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "elasticsearch") | nindent 6 }}
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
      initContainers:
        - name: sysctl
          image: busybox:1.37
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: "{{ .Values.elasticsearch.image.repository }}:{{ .Values.elasticsearch.image.tag }}"
          securityContext:
            runAsNonRoot: false
          ports:
            - containerPort: 9200
              name: http
          env:
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: xpack.security.enabled
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            {{- toYaml .Values.elasticsearch.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
  {{- if .Values.elasticsearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.elasticsearch.persistence.storageClass }}
        storageClassName: {{ .Values.elasticsearch.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.elasticsearch.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
