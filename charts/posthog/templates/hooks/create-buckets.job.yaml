{{/*
  Hook weight 1: Create S3 buckets on the bundled RustFS instance.
  Skipped when using external object storage (rustfs.enabled=false).
*/}}
{{- if .Values.rustfs.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-create-buckets
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "create-buckets") | nindent 4 }}
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "create-buckets") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: "{{ .Values.rustfs.image.clientImage.repository }}:{{ .Values.rustfs.image.clientImage.tag }}"
          imagePullPolicy: {{ .Values.rustfs.image.clientImage.pullPolicy | default "IfNotPresent" }}
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: object-storage-access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: object-storage-secret-key
          command:
            - sh
            - -ec
            - |
              until mc alias set rustfs http://{{ include "posthog.fullname" . }}-rustfs-svc:9000 "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY" && mc ls rustfs >/dev/null; do
                echo "rustfs not ready, retrying in 5s..."
                sleep 5
              done

              mc mb --ignore-existing rustfs/posthog
              mc mb --ignore-existing rustfs/ai-blobs
              mc ls rustfs/posthog >/dev/null
              mc ls rustfs/ai-blobs >/dev/null
              mc ls rustfs/
              echo "Buckets ready."
{{- end }}
