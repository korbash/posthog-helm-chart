{{/*
  Hook weight 10: Verify async migrations after all schema migrations are done.
*/}}
{{- if .Values.asyncMigrationsCheck.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-async-migrations-check
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "async-migrations-check") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "async-migrations-check") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: async-migrations-check
          image: "{{ include "posthog.imageRef" (dict "root" . "component" "asyncMigrationsCheck" "fallbackComponent" "posthog") }}"
          imagePullPolicy: {{ include "posthog.imagePullPolicy" (dict "root" . "component" "asyncMigrationsCheck" "fallbackComponent" "posthog") }}
          command:
            - python
            - manage.py
            - run_async_migrations
            - --check
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
{{- end }}
