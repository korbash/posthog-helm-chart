{{/*
  Hook weight 0: Create Kafka topics on external Kafka clusters.
  Skipped when using the bundled bitnami kafka (it has its own provisioning).
*/}}
{{- if and .Values.kafkaInit.enabled (not .Values.kafka.enabled) }}
{{- $kafkaBrokers := .Values.externalKafka.brokers }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-kafka-init
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "kafka-init") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: "{{ .Values.kafkaInit.image.repository }}:{{ .Values.kafkaInit.image.tag }}"
          imagePullPolicy: {{ .Values.kafkaInit.image.pullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - -ec
            - |
              deadline=$(( $(date +%s) + 300 ))
              until kafka-topics.sh --bootstrap-server {{ $kafkaBrokers }} --list >/dev/null; do
                if [ "$(date +%s)" -ge "${deadline}" ]; then
                  echo "timed out waiting for Kafka brokers: {{ $kafkaBrokers }}" >&2
                  exit 1
                fi
                echo "Kafka brokers not ready, retrying in 5s..."
                sleep 5
              done

              {{- range .Values.kafkaInit.topics }}
              kafka-topics.sh --bootstrap-server {{ $kafkaBrokers }} --create --if-not-exists --topic {{ . }}
              {{- end }}
              echo "All topics created successfully."
{{- end }}
