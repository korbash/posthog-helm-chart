---
## Object storage proxy
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $fullname }}-object-storage
  labels:
    {{- $labels | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ $hostname | quote }}
  path: /posthog
  to:
    kind: Service
    {{- if .Values.rustfs.enabled }}
    name: {{ $fullname }}-rustfs-svc
  port:
    targetPort: 9000
    {{- else }}
    name: {{ $fullname }}-web
  port:
    targetPort: 8000
    {{- end }}
  {{- with $tls }}
  tls:
    termination: {{ .termination | default "edge" }}
    insecureEdgeTerminationPolicy: {{ .insecureEdgeTerminationPolicy | default "Redirect" }}
    {{- if .certificate }}
    certificate: {{ .certificate | quote }}
    {{- end }}
    {{- if .key }}
    key: {{ .key | quote }}
    {{- end }}
    {{- if .caCertificate }}
    caCertificate: {{ .caCertificate | quote }}
    {{- end }}
  {{- end }}

---
## Default: everything else -> web service
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- $labels | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ $hostname | quote }}
  path: /
  to:
    kind: Service
    name: {{ $fullname }}-web
  port:
    targetPort: 8000
  {{- with $tls }}
  tls:
    termination: {{ .termination | default "edge" }}
    insecureEdgeTerminationPolicy: {{ .insecureEdgeTerminationPolicy | default "Redirect" }}
    {{- if .certificate }}
    certificate: {{ .certificate | quote }}
    {{- end }}
    {{- if .key }}
    key: {{ .key | quote }}
    {{- end }}
    {{- if .caCertificate }}
    caCertificate: {{ .caCertificate | quote }}
    {{- end }}
  {{- end }}

{{- end }}
