{{- if and .Values.ingress.enabled .Values.ingress.openshift.enabled }}
{{/*
  OpenShift Routes support one service backend per Route, so we create
  one Route per service path group. Routes are evaluated by the HAProxy
  router in longest-path-first order, so ordering here is cosmetic.
*/}}

{{- $fullname := include "posthog.fullname" . -}}
{{- $hostname := .Values.ingress.hostname -}}
{{- $labels := include "posthog.labels" . -}}
{{- $annotations := .Values.ingress.openshift.annotations | default dict -}}
{{- $tls := .Values.ingress.openshift.tls -}}

{{- if .Values.captureAi.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $fullname }}-capture-ai
  labels:
    {{- $labels | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ $hostname | quote }}
  path: /i/v0/ai
  to:
    kind: Service
    name: {{ $fullname }}-capture-ai
  port:
    targetPort: 3000
  {{- with $tls }}
  tls:
    termination: {{ .termination | default "edge" }}
    insecureEdgeTerminationPolicy: {{ .insecureEdgeTerminationPolicy | default "Redirect" }}
    {{- if .certificate }}
    certificate: {{ .certificate | quote }}
    {{- end }}
    {{- if .key }}
    key: {{ .key | quote }}
    {{- end }}
    {{- if .caCertificate }}
    caCertificate: {{ .caCertificate | quote }}
    {{- end }}
  {{- end }}
{{- end }}

