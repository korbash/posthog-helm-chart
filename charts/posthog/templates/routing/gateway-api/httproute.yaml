{{- if and .Values.ingress.enabled .Values.ingress.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "posthog.fullname" . }}
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.gatewayName }}
      namespace: {{ .Values.ingress.gateway.gatewayNamespace }}
      sectionName: {{ .Values.ingress.gateway.listenerName }}
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    {{- if .Values.captureAi.enabled }}
    ## AI capture endpoint -> capture-ai service (must be before /i/v0)
    - matches:
{{ include "posthog.gatewayPathMatches" "/i/v0/ai" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-capture-ai
          port: 3000
    {{- end }}
    {{- if .Values.captureLogs.enabled }}
    ## OTel logs/traces capture -> capture-logs service
    - matches:
{{ include "posthog.gatewayPathMatches" "/i/v1/logs" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/i/v1/traces" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-capture-logs
          port: 4318
    {{- end }}
    {{- if .Values.capture.enabled }}
    ## Event capture endpoints -> capture service
    - matches:
{{ include "posthog.gatewayPathMatches" "/e" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/i/v0" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/batch" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/capture" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-capture
          port: 3000
    {{- end }}
    {{- if .Values.replayCapture.enabled }}
    ## Session recording -> replay-capture service
    - matches:
{{ include "posthog.gatewayPathMatches" "/s" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-replay-capture
          port: 3000
    {{- end }}
    {{- if .Values.featureFlags.enabled }}
    ## Feature flags -> feature-flags service
    - matches:
{{ include "posthog.gatewayPathMatches" "/flags" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-feature-flags
          port: 3001
    {{- end }}
    {{- if .Values.hypercacheServer.enabled }}
    ## Surveys and remote config -> hypercache-server service
    - matches:
{{ include "posthog.gatewayPathMatches" "/surveys" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/api/surveys" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/array" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-hypercache-server
          port: {{ .Values.hypercacheServer.port | default 3002 }}
    {{- end }}
    {{- if .Values.livestream.enabled }}
    ## Livestream -> livestream service (WebSocket).
    ## URLRewrite with ReplacePrefixMatch requires exactly one PathPrefix match
    ## per Gateway API spec, so the rule deliberately omits the usual Exact pair.
    - matches:
        - path:
            type: PathPrefix
            value: /livestream
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-livestream
          port: 8080
    {{- end }}
    {{- if .Values.plugins.enabled }}
    ## Public webhooks -> plugins service
    - matches:
{{ include "posthog.gatewayPathMatches" "/public/webhooks" | indent 8 }}
{{ include "posthog.gatewayPathMatches" "/public/m" | indent 8 }}
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-plugins
          port: 6738
    {{- end }}
    ## Object storage proxy
    - matches:
{{ include "posthog.gatewayPathMatches" "/posthog" | indent 8 }}
      backendRefs:
        {{- if .Values.rustfs.enabled }}
        - name: {{ include "posthog.fullname" . }}-rustfs-svc
          port: 9000
        {{- else }}
        - name: {{ include "posthog.fullname" . }}-web
          port: 8000
        {{- end }}
    ## Default: everything else -> web service
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "posthog.fullname" . }}-web
          port: 8000
{{- end }}
