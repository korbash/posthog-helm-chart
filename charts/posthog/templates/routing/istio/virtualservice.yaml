{{- if and .Values.ingress.enabled .Values.ingress.istio.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "posthog.fullname" . }}
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
  {{- with .Values.ingress.istio.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  hosts:
    - {{ .Values.ingress.hostname | quote }}
  gateways:
    - {{ .Values.ingress.istio.gateway | quote }}
  http:
    {{- if .Values.captureAi.enabled }}
    ## AI capture endpoint -> capture-ai service (must be before /i/v0)
    - match:
{{ include "posthog.istioPathMatches" "/i/v0/ai" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-capture-ai
            port:
              number: 3000
    {{- end }}
    {{- if .Values.captureLogs.enabled }}
    ## OTel logs/traces -> capture-logs service
    - match:
{{ include "posthog.istioPathMatches" "/i/v1/logs" | indent 8 }}
{{ include "posthog.istioPathMatches" "/i/v1/traces" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-capture-logs
            port:
              number: 4318
    {{- end }}
    {{- if .Values.capture.enabled }}
    ## Event capture endpoints -> capture service
    - match:
{{ include "posthog.istioPathMatches" "/e" | indent 8 }}
{{ include "posthog.istioPathMatches" "/i/v0" | indent 8 }}
{{ include "posthog.istioPathMatches" "/batch" | indent 8 }}
{{ include "posthog.istioPathMatches" "/capture" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-capture
            port:
              number: 3000
    {{- end }}
    {{- if .Values.replayCapture.enabled }}
    ## Session recording -> replay-capture service
    - match:
{{ include "posthog.istioPathMatches" "/s" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-replay-capture
            port:
              number: 3000
    {{- end }}
    {{- if .Values.featureFlags.enabled }}
    ## Feature flags -> feature-flags service
    - match:
{{ include "posthog.istioPathMatches" "/flags" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-feature-flags
            port:
              number: 3001
    {{- end }}
    {{- if .Values.hypercacheServer.enabled }}
    ## Surveys and remote config -> hypercache-server service
    - match:
{{ include "posthog.istioPathMatches" "/surveys" | indent 8 }}
{{ include "posthog.istioPathMatches" "/api/surveys" | indent 8 }}
{{ include "posthog.istioPathMatches" "/array" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-hypercache-server
            port:
              number: {{ .Values.hypercacheServer.port | default 3002 }}
    {{- end }}
    {{- if .Values.livestream.enabled }}
    ## Livestream -> livestream service (WebSocket)
    - match:
{{ include "posthog.istioPathMatches" "/livestream" | indent 8 }}
      rewrite:
        uri: /
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-livestream
            port:
              number: 8080
    {{- end }}
    {{- if .Values.plugins.enabled }}
    ## Public webhooks -> plugins service
    - match:
{{ include "posthog.istioPathMatches" "/public/webhooks" | indent 8 }}
{{ include "posthog.istioPathMatches" "/public/m" | indent 8 }}
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-plugins
            port:
              number: 6738
    {{- end }}
    ## Object storage proxy
    - match:
{{ include "posthog.istioPathMatches" "/posthog" | indent 8 }}
      route:
        - destination:
            {{- if .Values.rustfs.enabled }}
            host: {{ include "posthog.fullname" . }}-rustfs-svc
            port:
              number: 9000
            {{- else }}
            host: {{ include "posthog.fullname" . }}-web
            port:
              number: 8000
            {{- end }}
    ## Default: everything else -> web service
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "posthog.fullname" . }}-web
            port:
              number: 8000
{{- end }}
