{{- if .Values.featureFlags.enabled }}
## ------------------------------------------------------------------
## Feature Flags service (Rust)
## ------------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-feature-flags
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "feature-flags") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "feature-flags") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-feature-flags
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "feature-flags") | nindent 4 }}
spec:
  {{- if not .Values.featureFlags.autoscaling.enabled }}
  replicas: {{ .Values.featureFlags.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "feature-flags") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "feature-flags") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "featureFlags") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "featureFlags") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "featureFlags") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "featureFlags") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "featureFlags") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "feature-flags") | nindent 6 }}
      {{- if .Values.geoip.enabled }}
      initContainers:
        {{- include "posthog.geoipInitContainer" (dict "root" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: feature-flags
          image: "{{ .Values.featureFlags.image.repository }}:{{ .Values.featureFlags.image.tag }}"
          imagePullPolicy: {{ .Values.featureFlags.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "featureFlags") | nindent 10 }}
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: ADDRESS
              value: "0.0.0.0:3001"
            {{- include "posthog.commonEnv" . | nindent 12 }}
            {{- if include "posthog.externalPostgresqlUseCredentialSecret" . }}
            - name: WRITE_DATABASE_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.database | default "posthog")) | quote }}
            - name: READ_DATABASE_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.database | default "posthog")) | quote }}
            - name: PERSONS_WRITE_DATABASE_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.personsDatabase | default .Values.externalPostgresql.database | default "posthog")) | quote }}
            - name: PERSONS_READ_DATABASE_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.personsDatabase | default .Values.externalPostgresql.database | default "posthog")) | quote }}
            {{- else }}
            - name: WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            - name: READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            - name: PERSONS_WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            - name: PERSONS_READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            {{- end }}
            {{- if .Values.geoip.enabled }}
            - name: MAXMIND_DB_PATH
              value: {{ printf "/share/%s" .Values.geoip.filename | quote }}
            {{- end }}
            - name: COOKIELESS_REDIS_HOST
              value: {{ .Values.externalRedis.url | default (printf "%s-redis" (include "posthog.fullname" .)) | quote }}
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
            {{- with .Values.featureFlags.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.featureFlags.resources | nindent 12 }}
          {{- if .Values.geoip.enabled }}
          volumeMounts:
            - name: geoip-db
              mountPath: /share
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /_readiness
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_readiness
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
      {{- if .Values.geoip.enabled }}
      volumes:
        - name: geoip-db
          emptyDir: {}
      {{- end }}
{{- end }}

