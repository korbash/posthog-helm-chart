{{- if .Values.livestream.enabled }}
## ------------------------------------------------------------------
## Livestream service (Go - WebSocket)
## ------------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-livestream
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "livestream") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "livestream") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-livestream
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "livestream") | nindent 4 }}
spec:
  replicas: {{ .Values.livestream.replicas }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "livestream") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "livestream") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "livestream") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "livestream") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "livestream") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "livestream") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "livestream") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "livestream") | nindent 6 }}
      {{- if .Values.geoip.enabled }}
      initContainers:
        {{- include "posthog.geoipInitContainer" (dict "root" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: livestream
          image: "{{ .Values.livestream.image.repository }}:{{ .Values.livestream.image.tag }}"
          imagePullPolicy: {{ .Values.livestream.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "livestream") | nindent 10 }}
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            {{- if .Values.geoip.enabled }}
            - name: LIVESTREAM_MMDB_PATH
              value: {{ printf "/share/%s" .Values.geoip.filename | quote }}
            {{- end }}
            - name: LIVESTREAM_CONSUMERS_EVENT_BROKERS
              value: {{ .Values.externalKafka.brokers | default (printf "%s-kafka:9092" (include "posthog.fullname" .)) | quote }}
            - name: LIVESTREAM_CONSUMERS_EVENT_TOPIC
              value: "events_plugin_ingestion"
            - name: LIVESTREAM_CONSUMERS_EVENT_GROUP_ID
              value: "livestream"
            - name: LIVESTREAM_CONSUMERS_EVENT_SECURITY_PROTOCOL
              value: "PLAINTEXT"
            - name: LIVESTREAM_CONSUMERS_SESSION_RECORDING_ENABLED
              value: "false"
            - name: LIVESTREAM_CONSUMERS_NOTIFICATION_ENABLED
              value: "false"
            - name: LIVESTREAM_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: posthog-secret
            {{- if include "posthog.externalPostgresqlUseCredentialSecret" . }}
            - name: LIVESTREAM_POSTGRES_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.database | default "posthog")) | quote }}
            {{- else }}
            - name: LIVESTREAM_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            {{- end }}
            {{- with .Values.livestream.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.livestream.resources | nindent 12 }}
          {{- if .Values.geoip.enabled }}
          volumeMounts:
            - name: geoip-db
              mountPath: /share
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      {{- if .Values.geoip.enabled }}
      volumes:
        - name: geoip-db
          emptyDir: {}
      {{- end }}
{{- end }}

{{- if .Values.cymbal.enabled }}
## ------------------------------------------------------------------
## Cymbal service (error/exception processing)
## ------------------------------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-cymbal
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "cymbal") | nindent 4 }}
spec:
  replicas: {{ .Values.cymbal.replicas }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "cymbal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "cymbal") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "cymbal") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "cymbal") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "cymbal") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "cymbal") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "cymbal") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "cymbal") | nindent 6 }}
      {{- if .Values.geoip.enabled }}
      initContainers:
        {{- include "posthog.geoipInitContainer" (dict "root" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: cymbal
          image: "{{ .Values.cymbal.image.repository }}:{{ .Values.cymbal.image.tag }}"
          imagePullPolicy: {{ .Values.cymbal.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "cymbal") | nindent 10 }}
          env:
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: BIND_PORT
              value: "3302"
            - name: KAFKA_CONSUMER_GROUP
              value: "cymbal"
            - name: KAFKA_CONSUMER_TOPIC
              value: "exceptions_ingestion"
            {{- include "posthog.commonEnv" . | nindent 12 }}
            {{- if include "posthog.externalPostgresqlUseCredentialSecret" . }}
            - name: PERSONS_URL
              value: {{ include "posthog.externalPostgresqlUrlValue" (dict "root" . "database" (.Values.externalPostgresql.personsDatabase | default .Values.externalPostgresql.database | default "posthog")) | quote }}
            {{- else }}
            - name: PERSONS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.databaseSecretName" . }}
                  key: {{ include "posthog.databaseSecretKey" . }}
            {{- end }}
            {{- if .Values.geoip.enabled }}
            - name: MAXMIND_DB_PATH
              value: {{ printf "/share/%s" .Values.geoip.filename | quote }}
            {{- end }}
            - name: ISSUE_BUCKETS_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: redis-url
            - name: RUST_LOG
              value: "info"
            {{- with .Values.cymbal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.cymbal.resources | nindent 12 }}
          {{- if .Values.geoip.enabled }}
          volumeMounts:
            - name: geoip-db
              mountPath: /share
              readOnly: true
          {{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -d /proc/1"
            initialDelaySeconds: 30
            periodSeconds: 30
      {{- if .Values.geoip.enabled }}
      volumes:
        - name: geoip-db
          emptyDir: {}
      {{- end }}
{{- end }}

