## ------------------------------------------------------------------
## Recording API
## ------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-recording-api
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "recording-api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6738
      targetPort: 6738
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "recording-api") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-recording-api
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "recording-api") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "recording-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "recording-api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "plugins") | nindent 6 }}
      {{- if .Values.geoip.enabled }}
      initContainers:
        {{- include "posthog.redisInitContainer" (dict "root" .) | nindent 8 }}
        {{- include "posthog.geoipInitContainer" (dict "root" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: recording-api
          image: "{{ .Values.plugins.image.repository }}:{{ .Values.plugins.image.tag }}"
          imagePullPolicy: {{ .Values.plugins.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 6738
              name: http
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: PLUGIN_SERVER_MODE
              value: "recording-api"
            - name: SESSION_RECORDING_API_REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: SESSION_RECORDING_API_REDIS_PORT
              value: "6379"
            {{- if .Values.geoip.enabled }}
            {{- include "posthog.geoipEnv" (dict "root" .) | nindent 12 }}
            {{- end }}
          {{- if .Values.geoip.enabled }}
          volumeMounts:
            {{- include "posthog.geoipVolumeMount" (dict "root" .) | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /_ready
              port: 6738
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_health
              port: 6738
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.recordingApi.resources | nindent 12 }}
      {{- if .Values.geoip.enabled }}
      volumes:
        {{- include "posthog.geoipVolume" (dict "root" .) | nindent 8 }}
      {{- end }}
---
